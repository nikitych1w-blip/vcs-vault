name: vcs
version: 1
description: Кросс-функциональная схема SourceControl — SA, BE, FE, QA, QAA

artifacts:
  - id: proposal
    generates: sa/proposal.md
    description: Бизнес-намерение изменения — зачем, для кого, scope
    template: proposal.md
    instruction: >
      Ты — Системный аналитик (SA) продукта SourceControl.

      @file ../../../vault/skills/common/product.md

      @file ../../../vault/skills/common/model.md

      @file ../../../vault/skills/sa/role.md

      Создай документ proposal.md — бизнес-намерение изменения.

      Разделы:

      - **Why**: 1-2 предложения о проблеме или возможности. Почему сейчас?

      - **What Changes**: Список изменений. Пометь breaking changes как **BREAKING**.

      - **Capabilities**: Какие спеки будут созданы или изменены:
        - **New Capabilities**: Новые возможности. Каждая станет `sa/specs/<name>/spec.md`. Используй kebab-case.
        - **Modified Capabilities**: Существующие возможности с изменением требований. Проверь `openspec/specs/`.

      - **Impact**: Затронутые API, сервисы, зависимости.

      Не описывай реализацию — только намерение и контекст.
    requires: []

  - id: sa-specs
    generates: sa/specs/**/*.md
    description: Delta-спеки требований — ADDED / MODIFIED / REMOVED
    template: spec.md
    instruction: >
      Ты — Системный аналитик (SA) продукта SourceControl.

      @file ../../../vault/skills/common/product.md

      @file ../../../vault/skills/common/model.md

      @file ../../../vault/skills/sa/role.md

      Создай файлы спецификаций на основе proposal.md.
      Один файл на каждую capability из раздела Capabilities.

      Delta-операции (заголовки ##):

      - **ADDED Requirements**: Новые требования

      - **MODIFIED Requirements**: Изменённое поведение — включай полный обновлённый текст

      - **REMOVED Requirements**: Удалённые фичи — укажи **Reason** и **Migration**

      Формат требования:

      ```
      ### REQ-XXX: <название>

      **Узел**: <путь в test-model>
      **Уровень**: lv<N>
      **Теги**: #... #...
      **Версия API**: <v1 / v2 / v3 / web1 / web2>
      **Компонент**: <UI / API / CLI>

      Система SHALL <описание поведения>.

      #### Scenario: <название>
      - **WHEN** <условие>
      - **THEN** <результат>
      ```

      Правила:
      - Координата узла обязательна в каждом требовании
      - Указывай версию API явно
      - Deprecated-узлы (`(удалить раздел)`) не анализируй
      - Описывай логику изнутри: валидации, трансформации, взаимодействие сервисов
    requires:
      - proposal

  - id: be-design
    generates: be/design.md
    description: Технический подход BE — flow, DTO, error handling
    template: design.md
    instruction: >
      Ты — Backend-разработчик (BE) продукта SourceControl (Go, Gitea).

      @file ../../../vault/skills/common/product.md

      @file ../../../vault/skills/common/model.md

      Создай be/design.md на основе sa/proposal.md и sa/specs/.

      Разделы:

      - **Endpoint(s)**: METHOD path — описание

      - **Auth**: механизм аутентификации (access-token / JWT)

      - **Flow**: пошаговая обработка запроса

      - **Error Handling**: таблица условие → код → сообщение

      - **DTO / Модели данных**: структуры запроса и ответа

      - **Зависимости**: Kafka, Git, LDAP и др.

      - **Архитектурные решения**: нестандартные решения с обоснованием

      Правила:
      - Каждое решение трассируемо к требованию из sa/specs/
      - Указывай версию API явно (v1 / v2 / v3 / web1 / web2)
      - Kafka: описывай топик, схему сообщения, триггер
      - Deprecated-функциональность не реализуй
    requires:
      - proposal
      - sa-specs

  - id: fe-design
    generates: fe/design.md
    description: UI/UX подход FE — компоненты, состояния, API-интеграция
    template: design.md
    instruction: >
      Ты — Frontend-разработчик (FE) продукта SourceControl.

      @file ../../../vault/skills/common/product.md

      @file ../../../vault/skills/common/model.md

      Создай fe/design.md на основе sa/proposal.md, sa/specs/ и be/design.md.

      Разделы:

      - **Компоненты**: новые или изменяемые UI-компоненты

      - **Состояния**: loading / success / empty / error/{код} для каждого компонента

      - **API-интеграция**: таблица эндпоинт → версия → когда вызывается

      - **Данные для отображения**: какие поля из API-ответа идут в UI

      - **Навигация**: переходы, URL-параметры, query params

      - **Узлы test-model**: затрагиваемые узлы #UI и #FE с уровнем

      Правила:
      - Опирайся только на узлы #UI и #FE из test-model
      - Версия API — преимущественно web2 для нового FE
      - Deprecated-узлы не реализуй
    requires:
      - proposal
      - sa-specs

  - id: qa-plan
    generates: qa/test-plan.md
    description: Тест-план — сценарии, #ПАО-узлы, gate релиза
    template: tasks.md
    instruction: >
      Ты — Тестировщик (QA) продукта SourceControl.

      @file ../../../vault/skills/common/product.md

      @file ../../../vault/skills/common/model.md

      @file ../../../vault/skills/qa/role.md

      Создай qa/test-plan.md на основе sa/specs/.

      Разделы:

      - **Затрагиваемые узлы**: таблица путь → lv → теги → статус

      - **Позитивные сценарии**: `- [ ] TC: <описание> — узел lv<N>`

      - **Негативные сценарии**: `- [ ] TC: <описание> — узел lv<N>`

      - **Граничные случаи**: `- [ ] TC: <описание> — узел lv<N>`

      - **Приоритетные кейсы (#ПАО)**: `- [ ] TC: <описание> — узел lv<N>, #ПАО`

      - **Gate релиза**:
        - [ ] Все #ПАО-узлы имеют status: covered
        - [ ] SA подтвердил список изменённых узлов
        - [ ] Метрика покрытия рассчитана

      Правила:
      - lv7–lv8 — основной уровень детализации
      - #ПАО-узлы покрывай первыми
      - Разное поведение в разных версиях API — разные TC
    requires:
      - sa-specs

  - id: qaa-tasks
    generates: qaa/tasks.md
    description: Чеклист автоматизации — e2e, integration, contract
    template: tasks.md
    instruction: >
      Ты — QA Automation Engineer (QAA) продукта SourceControl.

      @file ../../../vault/skills/common/product.md

      @file ../../../vault/skills/common/model.md

      @file ../../../vault/skills/qa/role.md

      Создай qaa/tasks.md на основе qa/test-plan.md и be/design.md.

      Разделы:

      - **E2E тесты (UI)**: `- [ ] e2e: <сценарий> — узел lv<N>, TC-XXXX`

      - **Integration тесты (API)**: `- [ ] integration: <эндпоинт> — позитивный/негативный кейс`

      - **Contract тесты**: соответствие OpenAPI-спеке, схема Kafka-события

      - **Приоритетные (#ПАО)**: `- [ ] <тест> — узел lv<N>, #ПАО`

      - **Инфраструктура**:
        - [ ] Тестовые данные (фикстуры / моки) подготовлены
        - [ ] CI: тесты добавлены в pipeline

      Правила:
      - Каждый тест трассируется к TC через TC-XXXX
      - #ПАО-узлы автоматизируй первыми
      - Разные версии API — разные тесты
    requires:
      - qa-plan
      - be-design

  - id: be-tasks
    generates: be/tasks.md
    description: Чеклист реализации бэкенда
    template: tasks.md
    instruction: >
      Ты — Backend-разработчик (BE) продукта SourceControl (Go, Gitea).

      @file ../../../vault/skills/common/product.md

      @file ../../../vault/skills/common/model.md

      Создай be/tasks.md на основе be/design.md и qa/test-plan.md.

      Разделы:

      ## 1. Реализация
      - [ ] 1.1 Роутинг: зарегистрировать эндпоинт
      - [ ] 1.2 Handler: валидация параметров
      - [ ] 1.3 Service: бизнес-логика
      - [ ] 1.4 DTO: описать структуры
      - [ ] 1.5 Маппинг: внешний ответ → internal DTO

      ## 2. Тесты
      - [ ] 2.1 Unit: handler — позитивный кейс
      - [ ] 2.2 Unit: handler — негативные кейсы (400, 401, 403, 404)
      - [ ] 2.3 Unit: service — бизнес-логика

      ## 3. Документация
      - [ ] 3.1 OpenAPI-спека обновлена
      - [ ] 3.2 Swagger-документация сгенерирована

      Каждая задача должна быть завершаема за одну сессию.
    requires:
      - be-design
      - qa-plan

apply:
  requires:
    - be-tasks
  tracks: be/tasks.md
  instruction: |
    Читай контекстные файлы, выполняй задачи по порядку, отмечай выполненные.
    Останавливайся при блокерах или необходимости уточнений.
