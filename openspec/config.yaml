    # FE · React Style Guide
    
    Скилл-выжимка. Полная заметка — `../../knowledges/fe/styleguide.md` (источник VCS-8306). Соблюдение проверяется ESLint/Prettier.
    
    ## Правила
    
    1. **Неиспользуемый параметр колбэка** → `_` (`items.map((_, index) => …)`).
    2. **Не `FC<>`** — типизировать пропсы напрямую: `const Button = ({ label }: Props) => …`.
    3. **`type` вместо `interface`** (`type User = {…}`, union, `Partial<User>`, `A & B`).
    4. **Явное приведение типов**: `Boolean(x)` / `String(x)` / `Number(x)`, не `!!` / `+ ''` / `+x`.
    5. **`data-testid`** (не `data-test-id`) — на ключевые интерактивные элементы.
    6. **Тип пропсов внутри файла — просто `Props`** (при импорте: `import { Props as ButtonProps }`).
    7. **Именованные импорты React**: `import { useState, useEffect } from 'react'` (не `import React`).
    
    ## Prettier (из `stack.md`)
    
    `printWidth 120`, `tabWidth 2`, `semi true`, `singleQuote true`, `trailingComma 'all'`, `arrowParens 'always'`, `endOfLine 'lf'`.
    
    ## Сортировка импортов (simple-import-sort)
    
    side-effects → react/пакеты → абсолютные `@/` → относительные `./` → `*.module.css` → `*.css` → медиа.
    
    ## ESLint-акценты
    
    `react/react-in-jsx-scope: off`, `jsx` только в `.tsx`, `no-unused-vars: warn`, `react-hooks/*: warn`.
    
    Связано: [[review]], [[architecture]], [[role]].
    
    ---
    
    # FE · Тесты и моки
    
    Скилл-выжимка. Полная заметка — `../../knowledges/fe/wiremock.md` (источник VCS-8337).
    
    ## WireMock (моки API)
    
    Маппинги в `__files` (тела) + `mappings` (правила). Покрывать **все состояния**: success / error / empty / loading.
    
    Сценарии (stateful) — по `scenarioName` + `requiredScenarioState`:
    - список (`GET …/entities` → `list.json`), элемент, создание (1-й POST → 400, 2-й → 201), удаление (1-й DELETE → 404, 2-й → 200).
    - начальное состояние `"Started"`, цепочка состояний непрерывна, без опечаток.
    - приоритет: меньше число = выше; точное совпадение метод/URL/query/headers/body.
    
    **Отладка:** `/__admin/requests`, сброс сценариев `POST /__admin/scenarios/reset`. В dev (Strict Mode) возможны дубль-запросы → использовать prod-сборку / curl / тесты.
    
    ## data-testid
    
    Добавлять на ключевые элементы для E2E/компонентных тестов — стандарт `data-testid` ([[styleguide]]).
    
    ## E2E
    
    Playwright (`@playwright/test`, `playwright.config.js`). Связывать сценарий с узлом test-model/TC (как у QAA), переиспользовать фикстуры из `mocks/__files/`.
    
    > ⚠️ Юнит-раннер компонентов (vitest/jest) в стеке однозначно не зафиксирован — уточнить у фронтендера; не выдумывать.
    
    Связано: [[states-checklist]], [[review]], [[role]].
