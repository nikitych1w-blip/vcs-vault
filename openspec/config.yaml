    # Скилл: review_spec (BE)
    
    > Общий контекст продукта: `common/product.md`
    > Система координат: `common/model.md`
    > Формат API-контракта (SA): `sa/role.md`
    > Базовые правила OpenAPI в проекте: `../../../sources/vcs-api/README_SA.md`
    
    ---
    
    ## Назначение
    
    `review_spec` - это backend-скилл для ревью UI OpenAPI-контракта с фокусом на главный вопрос:
    **подходит ли спецификация для реализации endpoint-а в backend по действующим нормам команды**.
    
    Область применения: **только UI-спека** (`api/openapi/ui/*`).
    
    ---
    
    ## Итоговые правила запуска (обязательно)
    
    Эти правила применяются в каждом прогоне `review_spec`, чтобы результат был воспроизводимым:
    
    1. Перед compat-проверкой агент **обязательно спрашивает у пользователя**, с какой базой сравнивать (`BASE`).
    2. Если пользователь не задает базу явно, использовать базу прошлого релиза: `origin/release/SourceControl/9.7.0`.
    3. Перед запуском обязательно подтвердить, что `BASE` - это именно нужный релиз для текущей задачи.
    4. Проверка выполняется полной командой compat:
       - `make check-api-compat-all BASE=<base_ref> FAIL_LEVEL=ERR` (в `vcs-api`).
    5. В отчет включаются **только ошибки уровня ERR**. `WARN/INFO` в блок findings не включаются.
    6. Без фактического запуска compat-проверки вердикт `approve` и `approve-with-comments` не допускается.
    
    ---
    
    ## Быстрый запуск (шпаргалка)
    
    1. Спросить у пользователя базу сравнения (`BASE`).
    2. Если пользователь не указал базу, взять:
       - `origin/release/SourceControl/9.7.0`.
    3. Выполнить:
       - `make check-api-compat-all BASE=<base_ref> FAIL_LEVEL=ERR` (в `vcs-api`).
    4. В отчет вынести:
       - `BASE`,
       - команду запуска,
       - итог (`PASS/FAIL`, количество `ERR`),
       - список только `ERR`-нарушений.
    
    ---
    
    ## Зоны ответственности
    
    - Проверка качества контракта UI OpenAPI перед backend-реализацией.
    - Проверка совместимости контракта с текущим состоянием backend-кода.
    - Выявление разрывов между спецификацией, codegen и маршрутизацией.
    - Формирование вердикта `approve` / `approve-with-comments` / `request-changes`.
    - Явная классификация проблем: блокеры vs рекомендации.
    
    ---
    
    ## Артефакты
    
    | Артефакт | Описание |
    |----------|----------|
    | Отчет ревью `review_spec` | Единый отчет по endpoint-ам с вердиктом |
    | Матрица реализации endpoint-ов | Статус `Draft` / `ReadyForBackend` / `ImplementedInBackend` / `Mismatch` |
    | Список блокеров | Изменения, без которых backend-реализация рискованна или некорректна |
    | Список рекомендаций | Улучшения контракта без немедленного блокирования |
    
    ---
    
    ## Порядок ревью endpoint-а
    
    Использовать порядок чтения (сверху вниз по контракту, затем по связям):
    
    1. Найти endpoint в `ui/index.yaml` (`paths` -> `$ref` в `domains/*/routes.yaml`).
    2. Прочитать паспорт операции: `tags`, `summary`, `operationId`, `x-internal`, `x-required-privilege`.
    3. Проверить вход: `parameters`, `requestBody`, `security`.
    4. Проверить выход: `responses` и все коды ошибок.
    5. Раскрыть все `$ref` до `components/schemas` (не останавливаясь на промежуточном `responses`).
    6. Проверить связь с backend-кодом: codegen (`StrictServerInterface`) -> роут (`routers/sc/api.go`) -> handler/service.
    7. Перед запуском compat-check обязательно уточнить у пользователя базовую версию сравнения (`BASE`: ветка/тег/commit).
       - Рекомендуемая формулировка вопроса:  
         `С какой релизной веткой сравнивать compat-check? По умолчанию origin/release/SourceControl/9.7.0.`
       - База по умолчанию для прошлого релиза: `origin/release/SourceControl/9.7.0`.
    8. Обязательно выполнить validation-checks:
       - в `vcs-api`: `make check-api-compat-all BASE=<base_ref> FAIL_LEVEL=ERR`.
       Без фактического запуска `make check-api-compat-all` вердикт `approve` и `approve-with-comments` не допускается.
    
    ---
    
    ## Блокирующий чеклист (готовность к backend-реализации)
    
    Пункты ниже считаются блокирующими, если endpoint помечен как готовый к реализации.
    
    | Проверка | Как проверять | Блокер, если |
    |----------|---------------|--------------|
    | Версия и структура спеки | `ui/index.yaml`, доменные `routes.yaml` | Сломана структура `$ref` или потеряна операция в `paths` |
    | `operationId` | В `routes.yaml` + bundle | `operationId` отсутствует, неуникален, нестабилен |
    | `x-internal` | На уровне метода (`get/post/...`) | Статус черновика неявен или проставлен не на уровне операции |
    | Контракт входа | `parameters`, `requestBody`, схемы | Нельзя однозначно разобрать вход в handler |
    | Контракт выхода | `responses`, `common/errors.yaml`, доменные responses | Нет корректной матрицы 2xx/4xx/5xx для реализации |
    | Security | Глобальный `security`, `cookieAuth` | Схема безопасности противоречива или отсутствует |
    | Привилегии | `x-required-privilege` vs `routers/sc/api.go` | Спека и backend проверяют разные права или privilege не определен для защищенной операции |
    | Проверки инструментами | `make check-api-compat-all BASE=<base_ref> FAIL_LEVEL=ERR` (в `vcs-api`) | Контракт не проходит проверку обратной совместимости без согласования breaking change |
    
    ---
    
    ## Контекст реализации endpoint-ов (что есть и чего нет)
    
    Для каждого endpoint обязательно определять статус реализации.
    
    ### Статусы
    
    - `Draft`: в спеке есть `x-internal: true`; endpoint не считается готовым к реализации.
    - `ReadyForBackend`: `x-internal` снят, контракт валиден, операция видна в codegen-интерфейсе.
    - `ImplementedInBackend`: есть `StrictServerInterface` + route в `routers/sc/api.go` + handler/service.
    - `Mismatch`: несоответствие между спекой и кодом (например, internal в спеке, но маршрут уже подключен).
    - `UnknownBackendState`: backend checkout недоступен для проверки (невозможно подтвердить codegen/route/handler).
    
    ### Матрица проверки (обязательная)
    
    ```markdown
    | Endpoint | operationId | x-internal | x-required-privilege | StrictServerInterface | Route(api.go) | Handler/Service | Статус | Комментарий |
    |----------|-------------|------------|----------------------|-----------------------|---------------|-----------------|--------|-------------|
    | /repos/{project_name}/{repo_name}/pulls/{index}/activity GET | GetPRActivity | true | read | есть | есть | есть | Mismatch | Endpoint уже живет в backend, но в спеке еще черновик |
    ```
    
    ### Минимум 3 сигнала реализованности
    
    1. Сигнал из OpenAPI: `operationId`, `x-internal`, `x-required-privilege`.
    2. Сигнал из codegen: операция есть в `StrictServerInterface` (`api/pkg/servers/ui/*/*-mini.gen.go`).
    3. Сигнал из роутинга: endpoint подключен в `routers/sc/api.go` с корректной проверкой прав.
    
    ---
    
    ## Рекомендательный чеклист (best practices)
    
    - Коды ответов не противоречат semantics метода (`201/202/204` и тело ответа).
    - Ошибки переиспользуют `common/errors.yaml`, а не дублируются вручную.
    - Параметры переиспользуются через `common/params.yaml` или доменные `params.yaml`.
    - Нейминг `operationId` консистентен (PascalCase, без случайного camelCase).
    - `x-required-privilege` выражает реальный доступ и согласован с backend middleware.
    - Путь и домен соответствуют уже принятому path-pattern (`/repos/...` vs `/projects/.../repos/...`).
    
    ---
    
    ## Формат отчета ревью
    
    ```markdown
    ## review_spec: <ветка/PR>
    
    **Surface**: UI
    **BASE для compat-check**: <ветка/тег/commit>
    **Команда compat-check**: `make check-api-compat-all BASE=<base_ref> FAIL_LEVEL=ERR`
    **Результат compat-check**: PASS | FAIL (ERR=<n>)
    **Вердикт**: approve | approve-with-comments | request-changes
    **Объем ревью**: <список endpoint-ов>
    
    ### 1) Blocking findings
    1. [Endpoint + method] <проблема>
       - Contract: <файл/поле в спеке>
       - Backend impact: <почему нельзя корректно реализовать>
       - Fix: <что нужно исправить>
    
    ### 2) Implementation context matrix
    | Endpoint | operationId | x-internal | x-required-privilege | StrictServerInterface | Route(api.go) | Handler/Service | Статус | Комментарий |
    |----------|-------------|------------|----------------------|-----------------------|---------------|-----------------|--------|-------------|
    
    ### 3) Recommendations
    - ...
    
    ### 4) Validation checks (обязательно)
    - [ ] make check-api-compat-all BASE=<base_ref> FAIL_LEVEL=ERR (`vcs-api`) - команда выполнена, результат PASS
    
    ### 5) Нарушения обратной совместимости (только ERR)
    - [ERR][<rule-id>] <METHOD> <PATH> - <проблема>
      - Источник: <файл/узел спецификации>
      - Влияние: <чем опасно для обратной совместимости>
      - Исправление: <как устранить>
    ```
    
    Если ERR-нарушений нет:
    ```markdown
    ### 5) Нарушения обратной совместимости (только ERR)
    - ERR-нарушений не найдено.
    ```
    
    ---
    
    ## Формат точечного комментария к операции
    
    ```markdown
    ### <METHOD> <PATH>
    
    **operationId**: <...>
    **Тип**: blocker | recommendation
    **Проблема**: <что не так>
    **Контракт**: <routes.yaml / responses.yaml / schemas.yaml>
    **Контекст backend**: <codegen / route / handler>
    **Ожидание**: <как должно быть по нормам>
    ```
    
    ---
    
    ## Принципы работы
    
    - Сначала контрактная корректность, затем соответствие реализации.
    - Не смешивать состояния "спека корректна" и "endpoint уже реализован".
    - Любой вывод должен быть трассируем: spec -> codegen -> router -> handler/service.
    - Для UI использовать только UI-источники; не переносить правила v2/v3 без явного запроса.
    - Если обнаружен `Mismatch`, фиксировать как минимум одним блокером до синхронизации контракта и backend.
    - `approve` / `approve-with-comments` допустимы только после фактического запуска `make check-api-compat-all` или явного запроса заказчика пропустить запуск.
    - Базовая версия compat-check (`BASE`) должна быть явно согласована с пользователем и отражена в отчете.
    - В отчет включать результаты compat только уровня `ERR`; `WARN/INFO` не включать в блок findings.
    - Формулировки в отчете должны быть на русском и однозначно отвечать на вопросы: что проверяли, с какой базой, какой результат.
    
    ---
    
    ## Чего избегать
    
    - Ревью "по summary", без раскрытия `$ref` до конечной схемы.
    - Ревью без проверки `x-internal` на уровне конкретной операции.
    - Игнорирование `x-required-privilege` и расхождений с `checkPrivilege(...)`.
    - Формулировки без указания endpoint-а, метода и поля спецификации.
    - Аппрув спецификации без признаков прохождения `make check-api-compat-all`.
    - Смешивание `WARN/INFO` с блокирующими compat-ошибками уровня `ERR` в основном списке findings.
    
    ---
    
    # Роль: Backend-разработчик (BE)
    
    > Общий контекст продукта: `common/product.md`
    > Система координат: `common/model.md`
    > Вход: артефакты `design.md` (контракт) и `specs/*` (требования) из OpenSpec-change.
    
    ---
    
    ## Стандарты кодстайла (источник правды по коду gitea)
    
    Детальные правила вынесены в отдельные доки этой папки (на них ссылаются скиллы `be-*`):
    
    | Док | Скилл | О чём |
    |-----|-------|-------|
    | [architecture.md](architecture.md) | `be-code-architecture` | слои, DI, нейминг, раскладка файлов, импорты |
    | [errors-logging.md](errors-logging.md) | `be-error-logging` | враппинг `%w`, уровни логов, где логировать, трейсинг |
    | [db-xorm.md](db-xorm.md) | `be-db-xorm` | DI engine, Entity/модели, транзакции, билдеры |
    | [migrations.md](migrations.md) | `be-db-migration` | миграции БД (sc-migrator/goose) при изменении схемы |
    | [endpoint-flow.md](endpoint-flow.md) | `be-implement-endpoint` | flow реализации ручки, handler, роутинг/права |
    | [submodule.md](submodule.md) | `be-submodule` | сабмодуль vcs-api: update-spec/ready-impl-use/gitlink |
    | [testing.md](testing.md) | `be-unit-tests` | корнер-кейсы тестов, generated-моки mockery |
    | [git-flow.md](git-flow.md) | `be-git-flow` | ветки, коммиты, husky/commitlint |
    | [code-review.md](code-review.md) | `be-pass-review` | процесс ревью, шаблон PR, CI-гейты, чек-лист ревьюера |
    
    Репозиторий продукта — `gitea` (форк Gitea); **legacy-подходы оригинального Gitea не копировать**, если противоречат стандарту.
    
    ### ⚠️ Окружение и пути (не хардкодить)
    
    Репозиторий `gitea` и связанные инструменты (`sc-migrator`, сабмодуль `vcs-api`) лежат **вне этого vault**, и их расположение **зависит от окружения** (потенциально `vcs-sandbox/gitea` на уровне vault, но не гарантировано).
    
    **Правило:** не предполагать `cd gitea` и не хардкодить абсолютные пути, DSN БД, порты, хосты. Перед выполнением команд, завязанных на расположение, — **уточнить у разработчика/оператора** актуальные значения. В примерах знаний `<gitea-repo>` — плейсхолдер пути к репозиторию (заменить после уточнения); DSN/порт в примерах — иллюстративные.
    
    ---
    
    ## Зоны ответственности
    
    - Реализация серверной логики по контракту из `design.md`: ручки API, валидации, бизнес-правила
    - Поддержка OpenAPI-спецификаций в `sources/vcs-api/` (домены v2/v3): `routes.yaml`, `schemas.yaml`, `responses.yaml`
    - Обработка интеграций: Git-хуки (#git), события Kafka (#kafka), статус-чеки Pipeliner (#pipeline)
    - Сохранение обратной совместимости API между версиями
    - Согласование контракта с SA и FE до начала реализации
    
    ---
    
    ## Артефакты
    
    | Артефакт | Описание |
    |----------|----------|
    | OpenAPI-домен | `routes/schemas/responses.yaml` в `sources/vcs-api` для затронутой версии |
    | Реализация ручки | Серверный код в репозитории продукта (`vcs-sc`) по контракту — при наличии доступа |
    | Impl-спека | Описание реализации (слои, сервисы, запросы к БД, события) — когда кода продукта нет под рукой |
    | Отчёт о совместимости | Результат `make check-api-compat-*` для затронутой поверхности |
    
    ---
    
    ## Режимы работы
    
    **Режим A — есть доступ к репозиторию продукта (`vcs-sc`/FE):**
    Реализую код по существующим паттернам репозитория, придерживаясь контракта из `design.md`.
    
    **Режим B — кода продукта нет под рукой:**
    Произвожу OpenAPI-контракт в `sources/vcs-api` + impl-спеку (слои, сервисы, модель БД, события Kafka, обработка ошибок) — этого достаточно, чтобы по ней реализовать ручку, когда репозиторий будет доступен.
    
    ---
    
    ## Работа с vcs-api (по `sources/vcs-api/README_SA.md`)
    
    - Структура домена: `domains/<domain>/{routes,schemas,responses}.yaml`; корневой `index.yaml` подключает домены через `$ref`.
    - Черновые ручки помечать `x-internal: true` **на уровне каждой операции** (`get/post/put/...`), не на уровне path. Снимать флаг, когда ручка взята в реализацию.
    - Теги (`tags`) не менять без согласования.
    - Перед PR: `make build` (lint + bundle), `make check-api-compat-all` (обратная совместимость), `make postman`.
    
    ---
    
    ## Формат impl-спеки
    
    ```markdown
    ## Реализация: <METHOD> /api/<версия>/<endpoint>
    
    **Узел**: <путь в test-model>
    **Контракт**: design.md → API-контракт
    **Домен vcs-api**: sources/vcs-api/api/openapi/http/<vN>/domains/<domain>/
    
    ### Слои
    - Handler → Service → Repository → БД
    - Валидации входа: ...
    - Бизнес-правила: ...
    
    ### Модель данных
    - Таблица/сущность, поля, индексы, FK, уникальные ограничения
    
    ### Интеграции
    - Kafka-события (топик, payload): ...
    - Git-хуки / Pipeliner: ...
    
    ### Ошибки
    | Код | Условие | Тело |
    |-----|---------|------|
    
    ### Обратная совместимость
    - Что добавлено / изменено; снятие x-internal; результат check-api-compat
    ```
    
    ---
    
    ## Принципы работы
    
    - **Контракт — источник правды.** Реализация строго соответствует `design.md` и OpenAPI в `vcs-api`. Расхождение — эскалация к SA.
    - **Координата в каждом артефакте.** Привязка к узлу test-model (путь + lv + теги).
    - **Версионность API.** Не смешивать поведение разных версий; новые поля — аддитивно.
    - **Обратная совместимость.** Не ломать существующие ручки; ломающие изменения — только согласованно и с пометкой **BREAKING**.
    - **#ПАО — приоритет.** Ручки на узлах с `#ПАО` реализуются первыми.
    
    ---
    
    ## Чего избегать
    
    - Не реализовывать поведение, не описанное в `design.md`/`specs`
    - Не менять контракт молча — сначала обновить `design.md`/`vcs-api` и согласовать с SA/QA
    - Не оставлять рабочие ручки с флагом `x-internal: true`
    - Не игнорировать `make check-api-compat-*` перед PR
    
    ---
    
    # BE · Сабмодуль vcs-api в gitea (BE Flow)
    
    Источник: VCS-22810. API-контракт живёт в сабмодуле `vcs-api` по пути `api/openapi/spec_embed/spec_from_sub_module` (относительно корня репо `gitea`). Типовой сценарий: аналитик вмержил ручку в `vcs-api/master` с `x-internal: true`, разработчик начинает реализацию в `gitea`.
    
    > ⚠️ `<gitea-repo>` ниже — плейсхолдер пути к репозиторию `gitea` (лежит вне vault, расположение уточнить у разработчика — см. `role.md` → «Окружение и пути»). Пути вида `api/openapi/...` — относительные внутри репо.
    
    ## Первый запуск
    
    ```bash
    cd <gitea-repo>
    make update-spec
    ```
    Ожидаемо: сабмодуль зарегистрирован и синхронизирован, sparse-checkout настроен, embedded-спеки собираются (`go build` для `api/openapi/spec_embed`).
    
    ## Работа с одним эндпойнтом
    
    1. `make update-spec` — актуальный checkout спеки.
    2. Снять `x-internal`:
       ```bash
       make ready-impl-use SURFACE=ui \
         API_PATH='/repos/{project_name}/{repo_name}/pulls/{index}/time_attributes/track' \
         METHOD=post
       ```
       Команда: создаёт/использует рабочую ветку в `vcs-api` (по умолчанию = имя текущей ветки `gitea`); снимает `x-internal`; `npm ci` при необходимости; `make build` в `vcs-api`; commit+push в `vcs-api`; проверяет embed; для `SURFACE=ui` запускает `make update-codegen`; добавляет в stage `gitea` gitlink сабмодуля и tracked `*.gen.go`.
    3. Реализовать endpoint и тесты в `gitea`, commit + push.
    
    **Порядок merge:** сначала merge ветки `gitea`, затем одноимённой ветки `vcs-api`.
    
    ## Базовая ветка сабмодуля
    
    В обычном flow менять не нужно. `.gitmodules` остаётся `branch = master`; переход на feature-commit — через gitlink (`ready-impl-use`), а не сменой базовой ветки. Если временно переключали на feature — перед финальным PR вернуть `.gitmodules` на `master` и `make update-spec`.
    
    ## Перепривязать gitlink на новый SHA
    
    ```bash
    cd <gitea-repo>/api/openapi/spec_embed/spec_from_sub_module
    BRANCH=feature/VCS-19369
    git fetch origin "$BRANCH"
    git checkout --detach "origin/$BRANCH"
    git rev-parse HEAD
    cd <gitea-repo>
    git add api/openapi/spec_embed/spec_from_sub_module
    ```
    На конкретный commit — то же с `git fetch` + `git checkout --detach <SHA>`. После `git add` закоммитить gitlink обычным коммитом feature-ветки. `git checkout --detach origin/<branch>` — безопасный способ, если локальная ветка разошлась.
    
    ## Если кодген затронул чужую ручку
    
    Проверить, на какой commit ссылается сабмодуль (`spec_from_sub_module`) — должен быть commit вашей feature-ветки `vcs-api`. Если не тот — переключить сабмодуль на нужный commit и `make update-codegen`.
    
    ## Force-флаги
    
    - `FORCE_UPDATE_SPEC=1` — принудительно обновить сабмодуль на свежий `vcs-api/master`, даже если pinned на non-master.
    - `FORCE_UPDATE_CODEGEN=1` — запустить кодген при изменённых tracked generated-файлах.
    - `ALLOW_ALREADY_PUBLIC=1` — для `ready-impl-use`, если `x-internal` уже снят.
    
    Норма: `current branch is pinned to non-master vcs-api commit; master refresh skipped` — защитная логика, сабмодуль оставлен на pinned commit до merge в master.
    
    ## Команды под капотом
    
    - `make update-spec` — регистрирует/инициализирует сабмодуль, sparse-checkout, ставит gitlink текущей ветки, переводит на свежий master только если безопасно.
    - `make update-codegen` — кодген по текущему сабмодулю; auto-stage только generated файлов; gitlink не стейджит.
    - `make clean-codegen` / `clean-pkg` / `clean-bundles` — чистка результатов кодгена.
    - `make ready-impl-use` — обязательно `SURFACE`, `METHOD`, `API_PATH` (или `REF`); опц. `API_BRANCH`, `API_COMMIT_MSG`, `API_TARGET`, `BASE_REF`. Печатает `SPEC_PROMOTE_SHA` — commit `vcs-api`, на который смотрит gitlink.
    
    ## Чек-лист
    
    - [ ] `spec_from_sub_module` на верном commit верной ветки `vcs-api`.
    - [ ] Кодген дал только изменения вашей ручки.
    - [ ] `make test-backend-correct` проходит.
    
    Связано: [[be-implement-endpoint]], [[be-git-flow]].
    
    ---
    
    # BE · Юнит-тесты и моки (gitea)
    
    Источники: VCS-22821 §8 (тесты endpoint-а), VCS-13092 (моки mockery).
    
    ## Корнер-кейсы (обязательный набор)
    
    Для новой логики endpoint-а нужны unit-тесты на:
    - позитивный сценарий;
    - валидационные ошибки (`400`) — проверка параметров request (payload/query/path);
    - отсутствие сущности (`404`);
    - внутренние ошибки (`500`);
    - специфичные бизнес-ветки (`401/403/409`, если есть).
    
    **Сначала тесты, затем реализация endpoint-а** (test-first).
    
    ## Моки — только generated (mockery)
    
    Самописные моки запрещены. Установка:
    ```bash
    go install github.com/vektra/mockery/v2@latest
    ```
    
    Директива над интерфейсом (`//go:generate` — ровно два слеша, иначе не запустится):
    ```go
    //go:generate mockery --name=SomeModule --output=./mocks --filename=some_module_mock.go
    type SomeModule interface {
        DoSomething(ctx context.Context, id string) error
        GetSomething(ctx context.Context, id string) (*Something, error)
    }
    ```
    Генерация: `go generate ./...`
    
    ### Два сценария размещения мока
    
    1. **Интерфейс используется во многих местах** — мок рядом с интерфейсом, импортируется по проекту:
       ```
       modules/some_module/
         some_module.go        # интерфейс + go:generate
         mocks/some_module_mock.go
       ```
    2. **Интерфейс нужен в одном/нескольких пакетах** — мок рядом с тестом пакета (через `--srcpkg`):
       ```
       services/some_service/
         some_service.go
         some_service_test.go  # go:generate здесь
         mocks/some_module_mock.go
       ```
       ```go
       //go:generate mockery --name=SomeModule --srcpkg=code.gitea.io/gitea/modules/some_module --output=./mocks --filename=some_module_mock.go
       ```
    
    ### Использование в тесте
    ```go
    import "code.gitea.io/gitea/modules/some_module/mocks"
    func TestSomething(t *testing.T) {
        m := new(mocks.SomeModule)
        m.On("DoSomething", mock.Anything, "123").Return(nil)
        // ...
    }
    ```
    
    ### Правила именования и флаги
    - Папка моков: `mocks/`; файл: `<имя_файла>_mock.go`.
    - Флаги mockery: `--name` (имя интерфейса), `--srcpkg` (пакет интерфейса), `--output` (куда), `--filename` (имя файла).
    
    ## Прогон
    
    ```bash
    make test-backend-correct   # перед коммитом
    ```
    
    > Открытый вопрос: что именно покрывает `make test-backend-correct` (только тесты / + линт / + покрытие) — уточняется. Узкие интерфейсы DI (см. [[be-db-xorm]]) упрощают мок-тестирование.
    
    Связано: [[be-implement-endpoint]], [[be-db-xorm]], [[be-code-architecture]].
