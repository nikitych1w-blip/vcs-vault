  ## Глубина анализа по уровню
  
  | Диапазон | Применение для SA |
  |----------|-------------------|
  | lv1–lv3 | Декомпозиция требований, границы модуля |
  | lv4–lv6 | Описание фич, API-контракты, use cases |
  | **lv6–lv8** | **Алгоритмы, валидации, бизнес-правила** |
  
