    # BE · Архитектура и нейминг (gitea)
    
    Источник правды по кодстайлу — стандарт команды (VCS-13092), дополнения: VCS-6472 (слои), VCS-15891 (пакет контроллера). Репозиторий продукта — `gitea` (форк Gitea; **не копировать legacy-подходы оригинального Gitea**, если противоречат стандарту).
    
    ## Слои (4–5)
    
    ```
    Web/REST → Controller(Handler/Server) → Service(Usecase) → Repository → Database
                                                  ↑ Domain/Model (независим)
    ```
    
    | Слой | Пакет | Назначение | Чего быть НЕ должно |
    |------|-------|------------|---------------------|
    | Handler/Server/Controller | `api/servers/ui`, `routers/api/v1..v3` | принимает HTTP, валидирует параметры, зовёт сервис, формирует HTTP-ответ | нет бизнес-логики; нет прямых походов в БД/Gitaly |
    | Service/Usecase | `services` | бизнес-логика, оркестрация репозиториев, проверка прав | нет HTTP-контекста (`http.Request/ResponseWriter`, статусов); нет деталей БД/XORM |
    | Pkg (опц.) | `modules` | общие переиспользуемые утилиты (http-клиенты, парсеры, обёртки) | нет конкретной бизнес-логики |
    | Repository | `repository` | доступ к данным: SQL/XORM/Gitaly; возвращает модели/Entity | нет бизнес-логики и проверки прав; нет транспортных ошибок |
    | Model/Domain | `models` | доменные сущности, DTO/Entity, доменные ошибки | нет зависимостей от верхних слоёв (запрещён импорт services/repository/routers) |
    
    ## DI
    
    Зависимости передаются в конструктор и хранятся в полях структуры; внутри методов — уже готовые зависимости, новые экземпляры руками не создаём. В новом коде **не используем указатели** (меньше риск nil pointer dereference). Сервис получает в конструктор репозитории/трейсер/логгер; репозиторий — engine/tracer.
    
    ## Суффиксы модулей по слоям
    
    | Слой | Именование |
    |------|------------|
    | Handler/Server | `<Name>Server` |
    | Service | `<Name>Service` |
    | PKG | `<Name>Module` |
    | Repository | `<Name>DB`, `<Name>Git` |
    | Model | `<Name>` |
    
    ## Нейминг и раскладка файлов
    
    **Общее правило:** файлы именуются по функциональной роли — `getter.go`, `setter.go`, `merger.go`, `creater.go`, `deleter.go`. Если в пакете много логики в одном файле — раздробить по ролям.
    
    **Серверный слой** (см. VCS-15891):
    - `server.go` — только конструктор (`Server`, `NewServer`), без бизнес-логики.
    - `interfaces.go` — все интерфейсы зависимостей контроллера в одном файле.
    - `handler_<operationId_snake_case>.go` — **1 операция = 1 файл**. Имя метода = `operationId` из OpenAPI; имя файла = `handler_` + snake_case(operationId). `operationId` — единственный источник правды.
    - `convert.go` — маппинг доменных сущностей в API-модели; `validate.go` — валидация; `errors.go` — типизированные API-ошибки.
    
    ```
    api/servers/ui/pull_requests/
    ├── server.go
    ├── interfaces.go
    ├── handler_get_pr.go        # operationId: GetPR
    ├── handler_subscribe_pr.go  # operationId: SubscribePR
    ├── convert.go  validate.go  errors.go
    ```
    
    **Сервисный слой:** `service.go` (интерфейс + структура + DI-конструктор), реализация методов по ролям — `getter.go`, `creater.go`, `deleter.go`.
    
    **Репозиторный слой:** постфикс источника данных:
    - БД → `_db.go` в `repository/db` (напр. `repository/db/repos/repo_db.go`).
    - Gitaly → `_git.go` в `repository/git` (напр. `repository/git/commits/commit_git.go`).
    - При дроблении объёмной логики базовый файл `{domain}_db.go` / `{domain}_git.go` хранит структуру и DI-конструктор: `repository/comment/comment_db.go`, `checker_db.go`, `deleter_db.go`.
    
    **Доменный слой:** `models/{domain}.go`; доменные ошибки — `models/error.go` внутри пакета; DTO — см. [[be-db-xorm]] (Entity).
    
    ## Структура импортов (3 блока, разделены пустой строкой)
    
    ```go
    import (
        "context"   // stdlib
        "fmt"
        "net/http"
    
        "github.com/go-chi/chi/v5"   // внешние (go get)
        "go.opentelemetry.io/otel"
    
        "code.gitea.io/gitea/modules/setting"  // внутренние
    )
    ```
    GoLand: Code Style → Go → Imports, Sorting type `gofmt`, Group stdlib imports.
    
    ## Legacy
    
    - Старые функции, заменяемые DI-реализацией, помечать `// Deprecated: use <...>` с указанием замены.
    - **Не использовать именованные возвращаемые значения** (`(err error)`) в новом коде.
    - Логику обращения к БД из `models`/`modules` при рефакторинге выносить в `repository` и помечать старое Deprecated.
    
    Связано: [[be-error-logging]], [[be-db-xorm]], [[be-implement-endpoint]].
    
    ---
    
    # BE · Прохождение ревью (gitea / SourceControl)
    
    Источники: ответы команды + проверка по реальному репо `gitea` (SC). Цель скилла — подготовить PR так, чтобы он прошёл ревью с первого раза.
    
    ## Процесс ревью
    
    - PR ревьюят **в самом `gitea`** (web SourceControl).
    - Нужно **2 аппрува** от **обязательных аппруверов** (заданы в настройках репозитория — правила защиты/ревью ветки).
    - **Автор может смержить сам**, если набраны аппрувы от обязательных аппруверов.
    - **Merge-стратегия: rebase.** Ветку после мёржа кто-то удаляет, кто-то нет (не регламентировано жёстко).
    
    ## Требования к названию
    
    - **Заголовок PR:** `VCS-XXXX: <что-то>`.
    - **Коммит:** `VCS-XXXX: <что было сделано>` (см. [[be-git-flow]]).
    - **Ветка:** `feature/VCS-XXXX_description` или `bugfix/VCS-XXXX_description`.
    
    ## Один тикет — один PR
    
    Желательно. Допускается объединять, если задачи маленькие (условно до ~100 строк) и завязаны на один функционал. Но лучше разделять.
    
    ## Шаблон PR (заполнять полностью)
    
    ```markdown
    # Что было сделано
    ***
    (краткое описание что изменилось)
    
    ## Результаты работы
    ***
    (скриншоты ответов из Postman для новых эндпоинтов, скриншоты логов для
    внутреннего функционала или другая информация, показывающая работу)
    
    # Обязательные требования к PR
    ***
    - [ ] Заголовок соответствует требованиям (VCS-XXXX заголовок задачи)
    - [ ] Название ветки соответствует шаблону (feature/VCS-XXXX_description, bugfix/VCS-XXXX_description)
    - [ ] Написаны тесты
    - [ ] Ошибки врапаются
    - [ ] У всех ошибок есть log.Error() или log.Debug()
    - [ ] Логирование соответствует стандарту
    - [ ] Код не содержит TODO/FIXME комментариев без связанной задачи
    - [ ] Нет магических значений без оформления в константы
    
    # Дополнительные требования
    - [ ] Добавлена информация в openAPI
    - [ ] Добавлен трейсинг
    ## Схема слоёв
    ## Аудит
    ```
    
    ## CI-гейты
    
    - **Тесты обязаны запускаться и проходить.** На новые ручки обязательны юниты ([[be-unit-tests]]).
    - `make test-backend-correct` = `go test ./... -v -tags=correct` — гоняет тесты с тегом `correct`, падает если тест упал. (Только тесты; линт/покрытие не считает.)
    - **Целевое покрытие — 80%** (порог как обязательный CI-гейт в коде не зафиксирован; держать как ориентир).
    
    ## Инструменты качества кода (реально в репо `gitea`)
    
    > ⚠️ Уточнение: golangci-lint в проекте **используется** (вопреки первоначальному «пока нет»). Конфиг — `.golangci.yml`.
    
    - **Формат:** `make fmt` → **gofumpt** (extra-rules) через `build/code-batch-process.go gitea-fmt`; `make fmt-check` падает при расхождении. (Не plain gofmt; goimports отдельно не гоняется — форматирование/импорты закрывают gofumpt + `.editorconfig`.)
    - **Линтер:** `make lint-go` = `golangci-lint run` (v1.52.2). `make lint-backend` = `lint-go` + `lint-go-vet` + `lint-editorconfig`. `make lint-go-fix` — автофикс.
    - **go vet:** через кастомный `gitea-vet` (`make lint-go-vet`).
    - **Включённые линтеры** (`.golangci.yml`): `errcheck, govet, staticcheck, gosimple, unused, ineffassign, revive, stylecheck, gocritic, gofmt, gofumpt, depguard, dupl, forbidigo, nakedret, nolintlint, unconvert, wastedassign, bidichk, typecheck`. (`gocyclo` выключен; `gosec` не включён.)
    - **revive** проверяет в т.ч.: `error-return`, `error-strings`, `error-naming`, `errorf`, `var-naming`, `exported`, `context-as-argument`, `receiver-naming`, `indent-error-flow` — пересекается с нашим стандартом ошибок ([[be-error-logging]]).
    
    Перед PR прогнать: `make fmt` · `make lint-backend` · `make test-backend-correct`.
    
    ## Чек-лист ревьюера (red flags)
    
    Кодстайл проверяется в т.ч. линтером, но на ревью смотрят по существу. Красные флаги:
    - нарушены **границы слоёв** (бизнес-логика в handler; handler ходит в БД/Gitaly; service знает про HTTP/XORM) — [[be-code-architecture]];
    - **самописные моки** вместо generated (mockery) — [[be-unit-tests]];
    - **незавёрнутые ошибки** (нет `%w`) или ошибки без `log.Error()/log.Debug()` — [[be-error-logging]];
    - **нет тестов на корнер-кейсы** (валидация/404/500/бизнес-ветки) для новой ручки;
    - **ломающие изменения API** без согласования;
    - **изменение схемы БД (таблицы/колонки/индексы) без миграции** `sc-migrator` — [[be-db-migration]];
    - **SQL кроме `SELECT`** (INSERT/UPDATE/DELETE/DDL, миграции) **без аппрува человека** (governance — CLAUDE.md);
    - `TODO/FIXME` без связанной задачи; магические значения без констант;
    - не добавлены OpenAPI/трейсинг (доп. требования шаблона).
    
    ## Порядок мёржа (фича с контрактом vcs-api)
    
    PR ревьюится, и **сначала мёржат ветку `gitea`, затем одноимённую ветку `vcs-api`** (см. [[be-submodule]], гайд VCS-22810).
    
    Связано: [[be-git-flow]], [[be-unit-tests]], [[be-error-logging]], [[be-code-architecture]], [[be-submodule]].
    
