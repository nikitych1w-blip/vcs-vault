                      title: 'DEV-1234: Fix critical bug in authentication'
                      summary: This issue is blocking the login functionality for premium users
                      icon:
                        url16x16: https://mycompany.com/support/images/icons/bug.png
                        title: Bug
                        link: https://mycompany.com/support
                      status:
                        resolved: false
                        icon:
                          url16x16: https://mycompany.com/support/images/icons/open.png
