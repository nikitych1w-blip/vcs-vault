            description: issue id or key
            value: ISSUE-123
      - name: linkId
        in: path
        description: Remote link id
        required: true
        schema:
          type: string
          example: Пример
          maxLength: 2147483647
          pattern: .*
        examples:
          remote link id:
            description: remote link id
            value: 123
      responses:
        '200':
          description: Успех
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwtrJiraIssueRemoteLinkDto'
                description: Remote issue link
                example: null
              examples:
                Пример:
                  description: Пример
                  value:
                    id: 12345
                    self: https://your-jira-instance.com/rest/api/2/issue/PROJ-123/remotelink/12345
                    globalId: system=https://mycompany.com/support&id=1
                    application:
                      type: com.mycompany.myapp
                      name: My Company Application
                    relationship: causes
