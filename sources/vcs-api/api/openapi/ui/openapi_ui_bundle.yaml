  /repos/{project_name}/{repo_name}/diff/filechunk:
    get:
      summary: Получение содержимого файла по диапазону строк
      description: Возвращает указанный диапазон строк из файла в указанной ветке
      tags:
        - Diff
      operationId: GetFileChunk
      parameters:
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/repo_name'
        - $ref: '#/components/parameters/parameters-branch'
        - $ref: '#/components/parameters/file_path'
        - $ref: '#/components/parameters/from_line'
        - $ref: '#/components/parameters/to_line'
      responses:
        '200':
          $ref: '#/components/responses/FileChunkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /projects/{project_name}/repos/{repo_name}/branches/{branch_name}:
    delete:
      summary: Удалить ветку
      tags:
        - Branches
      operationId: DeleteRepoBranch
      parameters:
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/repo_name'
        - $ref: '#/components/parameters/branch_name'
      responses:
        '200':
          $ref: '#/components/responses/BranchUpdateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      summary: Переименовать ветку
      tags:
        - Branches
      operationId: RenameRepoBranch
      parameters:
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/repo_name'
        - $ref: '#/components/parameters/branch_name'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BranchRenamePayload'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /projects/{project_name}/repos/{repo_name}/branches/{branch_name}/restore:
    post:
      summary: Восстановить ветку
      tags:
        - Branches
      operationId: RestoreRepoBranch
      parameters:
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/repo_name'
        - $ref: '#/components/parameters/branch_name'
      responses:
        '201':
          $ref: '#/components/responses/BranchRestoreResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /access/projects/{project_name}:
    get:
      summary: Получить права доступа к конкретному проекту
      description: Возвращает информацию о правах пользователя на конкретный проект по его имени
      tags:
        - Access
      operationId: GetAccessProject
      parameters:
        - $ref: '#/components/parameters/project_name'
      responses:
        '200':
          $ref: '#/components/responses/AccessProjectResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /access/projects:
    post:
      summary: Получить права доступа к списку проектов
      description: Возвращает информацию о правах пользователя на несколько проектов по их Name
      tags:
        - Access
      operationId: GetAccessProjectList
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessProjectsPayload'
      responses:
        '200':
          $ref: '#/components/responses/AccessProjectsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /access/repos:
    post:
      summary: Получить права доступа ко всем репозиториям
      description: Возвращает информацию о правах пользователя на несколько репозиториев
      tags:
        - Access
      operationId: GetAccessReposList
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessReposPayload'
      responses:
        '200':
          $ref: '#/components/responses/AccessReposResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /access/projects/{project_name}/repos/{repo_name}:
    get:
      summary: Получить права доступа к конкретному репозиторию
      description: Возвращает информацию о правах пользователя на конкретный репозиторий по его имени
      tags:
        - Access
      operationId: GetAccessRepo
      parameters:
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/repo_name'
      responses:
        '200':
          $ref: '#/components/responses/AccessRepoResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /access/projects/{project_name}/repos:
    get:
      summary: Получить права доступа к списку репозиториев проекта
      description: Возвращает информацию о правах пользователя на все репозитории в рамках проекта
      tags:
        - Access
      operationId: GetAccessProjectsReposList
      parameters:
        - $ref: '#/components/parameters/project_name'
      responses:
        '200':
          $ref: '#/components/responses/AccessReposResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /projects/{project_name}/repos/{repo_name}/browse:
    get:
      tags:
        - Repository
      summary: Получение информации о содержимом репозитория на 0 уровне вложенности
      operationId: GetBrowseRepoContent
      parameters:
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/repo_name'
        - $ref: '#/components/parameters/ref'
        - $ref: '#/components/parameters/path'
      responses:
        '200':
          $ref: '#/components/responses/BrowseRepoContentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{project_name}/{repo_name}/raw:
    get:
      tags:
        - Repository
      summary: Получить содержимое файла в формате base64
      description: |
        Получение файла из репозитория (с возможностью указать ветку/тэг)
        Поддерживаются форматы:
          Исходный код (.go, .py, .js, .java, .rs, .ts, .c, .cpp, .h, .cs, .rb, .php, .sh, .sql, и др.),
          Markdown (.md, .markdown),
          CSV / TSV (.csv, .tsv),
          JSON,
          YAML / TOML,
          XML,
          Diff / Patch (.diff, .patch),
          SVG (.svg),
          Изображения (.png, .jpg, .jpeg, .gif, .webp),
          Текстовые файлы (.txt, .log, без расширения: LICENSE, README, CHANGELOG).
      operationId: GetRepoRawFile
      parameters:
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/repo_name'
        - name: ref
          in: query
          required: false
          description: |
            Ссылка на ветку или тег в формате `branch/<название>` или `tag/<название>`. Например: `branch/develop`, `tag/release/8.1.0`. Если не передан, то по умолчанию - дефолтная ветка репозитория.
          schema:
            type: string
            pattern: ^(branch|tag)/.+$
          example: branch/develop
        - name: path
          in: query
          required: true
          schema:
            type: string
          description: Путь к файлу от корневой директории. Например README.md или src/spa/index.js
      responses:
        '200':
          $ref: '#/components/responses/RepoRawFileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token
  schemas:
    User:
      type: object
      properties:
        active:
          type: boolean
          description: Активен?
        avatar_url:
          type: string
          description: URL аватара
        created:
          type: string
          format: date-time
          description: Дата создания пользователя
        description:
          type: string
        email:
          type: string
          description: Email пользователя
        followers_count:
          type: integer
          format: int64
        following_count:
          type: integer
          format: int64
        id:
          type: integer
          format: int64
          description: ИД
        is_admin:
          type: boolean
          description: Администратор?
        language:
          type: string
          description: Язык
          example: ru-RU
        last_login:
          type: string
          format: date-time
          description: Дата последнего входа
        location:
          type: string
          description: Месторасположение
        login:
          type: string
          description: Логин
        full_name:
          type: string
          description: Полное имя пользователя
        lower_name:
          type: string
          description: Полное имя пользователя
        prohibit:
          type: boolean
          description: Запрещен вход?
        restricted:
          type: boolean
          description: Ограничен доступ?
        starred_repos_count:
          type: integer
          format: int64
        visibility:
          type: string
          description: Видимость пользователя
          enum:
            - public
            - limited
            - private
        website:
          type: string
          description: Вебсайт
        has_password:
          type: boolean
          description: Есть ли у пользователя пароль
      required:
        - id
        - login
        - lower_name
        - full_name
        - visibility
        - restricted
        - prohibit
        - is_admin
        - active
        - language
        - created
        - starred_repos_count
        - followers_count
        - following_count
    ErrorResponse:
      type: object
      required:
        - type
        - title
        - detail
      properties:
        type:
          type: string
          nullable: true
          example: 'null'
          description: URI типа ошибки (временно null)
        title:
          type: string
          example: Некорректный запрос
          description: Краткое название ошибки
        detail:
          type: string
          example: Проверьте корректность переданных данных
          description: Подробное описание ошибки
        validation:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: name
                description: Имя поля, в котором произошла ошибка
              error:
                type: string
                example: Ошибка в имени
                description: Описание ошибки для конкретного поля
          description: Массив ошибок валидации (если есть)
    SbtOneWorkConfig:
      type: object
      description: Конфигурация модуля sbt.one_work
      properties:
        enabled:
          type: boolean
          description: Определяет подключение компонента side-menu. При подключении бокового меню, скрывается стандартное горизонтальное меню SourceControl
          example: true
        is_pao:
          type: boolean
          description: Запущено ли приложение в контуре ПАО. Помогает фронту при подключении компонента side-menu
          example: true
        service_url:
          type: string
          description: Абсолютный URL для доступа к сервисам OneWork
          example: https://dev.pd10.pvw.sbt/ssd/ssd-side-menu-backend
        tool_key:
          type: string
          description: Ключ инструмента. Предустановленное значения со стороны OneWork
          example: sc-dev3
        context_uri:
          type: string
          description: Идентификатор контекста. Для режима organization необходимо установить путь к организации в OneWork
          example: /scdev
        menu_key:
          type: string
          description: Ключ меню для режима organization. Предустановленное значения со стороны OneWork. Связывает локальные пункты меню с инструментом в OneWork
          example: source_control
        login_link:
          type: string
          description: Cсылка на сервис авторизации. Ссылка будет установлена на кнопке "Вход" для страницы приветсвия в SourceControl
          example: https://dev.pd10.pvw.sbt/ssd/tools/sc-ift3/
        logout_link:
          type: string
          description: Cсылка для выхода из системы при авторизации через IAM
          example: https://dev.pd10.pvw.sbt/ssd/tools/sc-ift3/logout
        fallback_timeout:
          type: string
          format: int32
          description: Время ожидания ответа от сервиса OneWork после которого меню перейдет в состояние Fallback. Значение передается в формате секунд. По умолчанию равно 10s. Обязательный параметр для меню типа ONEWORK.
          example: 5s
        extended_admin_panel:
          type: boolean
          description: Включена ли расширенная панель администратора
    ClickStreamStandaloneConfig:
      type: object
      description: Конфигурация для пакета @sbol/clickstream-agent используется только в standalone версии
      properties:
        enabled:
          type: boolean
          description: Определяет инициализацию сервиса ClickStream для Standalone режима
          example: true
        report_url:
          type: string
          description: Адрес для отправки событий
          example: https://clickstream.domain.local
        api_key:
          type: string
          description: API Ключ инструмента для взаимодействия с Clickstream backend
          example: sc-dev3
    ArchiveConfig:
      type: object
      description: Конфигурация репозиторных архивов
      properties:
        max_retries:
          type: integer
          description: Количество попыток выкачивания архива
          example: 10
        retry_timeout:
          type: string
          format: int32
          description: Время между попытками скачивания архива. По умолчанию равно 15s.
          example: 15s
    RepositoryConfig:
      type: object
      description: Конфигурация репозиториев
      properties:
        system_labels_enabled:
          type: boolean
          description: Включены ли системные метки
          example: true
      required:
        - system_labels_enabled
    Configuration:
      type: object
      description: Общий объект конфигурации, включающий настройки отдельных модулей
      properties:
        app_sub_url:
          type: string
          description: Контекст расположения приложения
          example: /ssd/tools/sc-dev2
        sbt.one_work:
          $ref: '#/components/schemas/SbtOneWorkConfig'
        clickstream.standalone:
          $ref: '#/components/schemas/ClickStreamStandaloneConfig'
        archive.config:
          $ref: '#/components/schemas/ArchiveConfig'
        repository:
          $ref: '#/components/schemas/RepositoryConfig'
      required:
        - app_sub_url
        - sbt.one_work
        - clickstream.standalone
        - archive.config
        - repository
    Pagination:
      type: object
      description: Объект, представляющий информацию о пагинации
      properties:
        current_page:
          type: integer
          description: Текущая страница
          example: 1
        per_page:
          type: integer
          description: Число элементов на одной странице
          example: 30
        total_pages:
          type: integer
          description: Всего страниц
          example: 10
        total_items:
          type: integer
          description: Общее количество элементов
          example: 250
        next_page:
          type: integer
          nullable: true
          description: Следующая страница (null, если последняя)
          example: 2
        previous_page:
          type: integer
          nullable: true
          description: Предыдущая страница (null, если первая)
          example: null
        first_item:
          type: integer
          description: Индекс первого элемента на текущей странице
          example: 1
        last_item:
          type: integer
          description: Индекс последнего элемента на текущей странице
          example: 30
    PaginatedTopicsList:
      description: Пагинированный список топиков
      type: object
      properties:
        pagination:
          $ref: '#/components/schemas/Pagination'
        data:
          description: Список топиков подходящих под поиск
          type: array
          items:
            type: string
      required:
        - pagination
        - data
    LanguageInfo:
      description: Информация о языке
      type: object
      properties:
        percent:
          description: Процент использования языка
          type: number
        name:
          description: Название языка
          type: string
        color:
          description: Цвет для языка
          type: string
      required:
        - percent
        - name
        - color
    RepoParent:
      type: object
      properties:
        link:
          type: string
          example: http://parent.repo
          description: ссылка на родительский репозиторий
        full_name:
          type: string
          example: org/repo
          description: полное название репозитория
      required:
        - link
        - full_name
    RepoShortListItem:
      description: Короткая информация о репозитории, для выведения списка репозиториев
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Уникальный идентификатор
        avatar_url:
          type: string
          description: Ссылка на аватар репозитория
        name:
          type: string
          description: Название репозитория
        full_name:
          type: string
          description: Полное имя репозитория (owner/repo)
        private:
          type: boolean
          description: Частный ли репозиторий
        internal:
          type: boolean
          description: Внутренний ли репозиторий
        template:
          type: boolean
          description: Является ли шаблоном
        fork:
          type: boolean
          description: Является ли форком
        topics:
          type: array
          items:
            type: string
          description: Теги репозитория
        description:
          type: string
          description: Описание репозитория
        forks_count:
          type: integer
          format: int64
          description: Количество форков
        stars_count:
          type: integer
          format: int64
          description: Количество звёзд
        is_starring:
          type: boolean
          description: Добавлен ли в избранное
        watchers_count:
          type: integer
          format: int64
          description: Количество наблюдателей
        is_watching:
          type: boolean
          description: Отслеживается ли пользователем
        archived:
          type: boolean
          description: Признак архивности
        archived_at:
          type: string
          format: date-time
          description: Дата перевода в архив
        updated_at:
          type: string
          format: date-time
          description: Дата последнего обновления
        created_at:
          type: string
          format: date-time
          description: Дата создания репозитория
        is_in_source_hub:
          type: boolean
          description: Находится ли репозиторий в in_source_hub
        main_language:
          description: Основной язык репозитория
          nullable: true
          $ref: '#/components/schemas/LanguageInfo'
        repo_parent:
          description: Родительский репозиторий (если форк)
          nullable: true
          $ref: '#/components/schemas/RepoParent'
      required:
        - id
        - avatar_url
        - name
        - full_name
        - private
        - internal
        - template
        - fork
        - topics
        - description
        - forks_count
        - stars_count
        - is_starring
        - watchers_count
        - is_watching
        - archived
        - archived_at
        - updated_at
        - created_at
        - is_in_source_hub
    ReposShortList:
      type: object
      properties:
        pagination:
          $ref: '#/components/schemas/Pagination'
        data:
          description: Список репозиториев (короткая информация)
          type: array
          items:
            $ref: '#/components/schemas/RepoShortListItem'
      required:
        - data
        - pagination
    RepoExternalMetric:
      type: object
      properties:
        key:
          type: string
          enum:
            - downloads
            - telemetry
            - artifacts
            - reuse
            - labor_costs
          description: Идентификатор (ключ) метрики. Возможные значения - downloads, telemetry, artifacts, reuse, labor_costs
          example: downloads
        value:
          type: integer
          format: int64
          description: Значение метрики
          example: 150
          nullable: true
        text:
          type: string
          description: Подпись для метрики
          example: Метрика переиспользования
      required:
        - key
    RepoExternalMetrics:
      type: object
