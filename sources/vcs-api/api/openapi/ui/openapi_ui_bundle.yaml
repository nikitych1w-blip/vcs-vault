        tree_path:
          type: string
          description: Путь к файлу в репозитории
          maxLength: 4096
          example: src/main/java/com/example/Service.java
        line:
          type: integer
          format: int64
          minimum: 1
          description: |
            Номер строки в файле хранится в бд следующим образом Если это строка, которая удалена(подсвечивается красным), то line<0 Если это строка, которая добавлена(подсвечивается зелёным), то line>0
          example: 42
        patch:
          type: string
          description: Контекст кода вокруг комментария. 4 строки выше линии комментария
          nullable: true
          example: |-
            @@ -10,7 +10,7 @@ class Service {
            -    return false;
            +    return true;
    PRCodeCommentPayload:
