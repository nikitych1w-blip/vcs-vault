    UploadSummary:
      type: object
      description: Сводка по результатам мультизагрузки
      properties:
        total:
          type: integer
          description: Общее количество переданных файлов
          example: 4
        success:
          type: integer
          description: Количество успешно загруженных файлов
          example: 2
        failed:
          type: integer
          description: Количество файлов, загрузка которых завершилась ошибкой
          example: 2
      required:
        - total
        - success
        - failed
    UploadResultData:
      type: object
      description: Данные успешно загруженного файла
      properties:
        upload_uid:
          type: string
          format: uuid
          description: Уникальный идентификатор загруженного файла
          example: 123e4567-e89b-12d3-a456-426614174000
        url:
          type: string
          format: uri
          description: URL загруженного файла (если доступен)
          example: https://cdn.example.com/files/file_001.pdf
        size:
          type: integer
          description: Размер файла в байтах
          example: 102400
        content_type:
          type: string
          description: MIME-тип файла
          example: application/pdf
      required:
        - upload_uid
        - size
        - content_type
        - url
    UploadResultErrorDetails:
      type: object
      description: Детали ошибки загрузки (заполняются в зависимости от типа ошибки)
      properties:
        detectedType:
          type: string
          description: Определённый MIME-тип файла (для ошибок типа файла)
          example: application/x-executable
        allowedTypes:
          type: array
          items:
            type: string
          description: Список разрешённых типов
          example:
            - image/*
            - application/pdf
        fileSize:
          type: integer
          description: Размер переданного файла в байтах
          example: 15728640
        maxSize:
          type: integer
          description: Максимально допустимый размер в байтах
          example: 10485760
    UploadResultError:
      type: object
      description: Ошибка загрузки файла
      properties:
        message:
          type: string
          description: Сообщение об ошибке
          example: Executable files are not permitted
        details:
          $ref: '#/components/schemas/UploadResultErrorDetails'
      required:
        - message
    UploadResultItem:
      type: object
      description: Результат загрузки одного файла (порядок соответствует порядку в запросе)
      properties:
        filename:
          type: string
          description: Имя файла
          example: document.pdf
        status:
          type: string
          enum:
            - success
            - failed
          description: Статус загрузки
        data:
          $ref: '#/components/schemas/UploadResultData'
          description: Присутствует при status = success
        error:
          $ref: '#/components/schemas/UploadResultError'
          description: Присутствует при status = failed
      required:
        - filename
        - status
    MultiFileUploadResponse:
      type: object
      description: Результат мультизагрузки файлов
      properties:
        summary:
          $ref: '#/components/schemas/UploadSummary'
        results:
          type: array
          items:
            $ref: '#/components/schemas/UploadResultItem'
          description: Результаты по каждому файлу (порядок совпадает с порядком в запросе)
      required:
        - summary
        - results
    PullRequestCreatePayload:
      type: object
      required:
        - title
        - from_branch
        - to_branch
      properties:
        title:
          type: string
          description: Название Pull Request
          example: 'PROJ-123: Implement new authentication flow'
        description:
          type: string
          description: Подробное описание Pull Request
          example: |
            This PR implements the new OAuth2 authentication flow.
            Changes include:
            - Added new OAuth2 provider configuration
            - Updated login controller
            - Added unit tests for new functionality
        from_branch:
          type: string
          description: Исходная ветка
          example: feature/new-auth-flow
        to_branch:
          type: string
          description: Целевая ветка
          example: develop
        reviewer_ids:
          type: array
          items:
            type: integer
            format: int64
          description: Список ID пользователей, назначаемых рецензентами
          example:
            - 1
            - 3
            - 7
        label_ids:
          type: array
          items:
            type: integer
            format: int64
          description: Список ID меток для PR
          example:
            - 1
            - 3
            - 7
        milestone_id:
          type: integer
          format: int64
          nullable: true
          description: ID этапа (milestone) для PR
          example: 5
        attachments:
          type: array
          items:
            type: string
            format: uuid
          description: Массив UUID загруженных файлов (полученных через метод загрузки)
          example:
            - 123e4567-e89b-12d3-a456-426614174000
            - 987fcdeb-51a2-43c7-9d8e-123456789abc
    ShortBranchInfo:
      type: object
      description: Краткая информация о ветке
      properties:
        name:
          type: string
          description: Имя ветки
          example: main
        sha:
          type: string
          description: SHA ветки
          example: a1b2c3d4e5f678901234567890abcdef12345678
      required:
        - name
        - sha
    PRInfo:
      type: object
      description: Информация по PR
      properties:
        base:
          $ref: '#/components/schemas/ShortBranchInfo'
          description: Информация о целевой ветке (куда мержится)
        body:
          type: object
          description: Тело PR и информация о его вложениях
          nullable: true
          properties:
            description:
              type: string
              description: Тело PR
              example: This PR fixes the email validation bug on the login page.
            attachments:
              type: array
              items:
                type: string
                format: uuid
              description: Массив UUID загруженных файлов (полученных через метод загрузки)
              example:
                - 123e4567-e89b-12d3-a456-426614174000
                - 987fcdeb-51a2-43c7-9d8e-123456789abc
        closed_at:
          type: string
          format: date-time
          description: Время закрытия (если закрыт)
          nullable: true
          example: '2019-08-24T14:15:22Z'
        created_at:
          type: string
          format: date-time
          description: Время создания
          example: '2019-08-24T14:15:22Z'
        head:
          $ref: '#/components/schemas/ShortBranchInfo'
          description: Информация о исходной ветке (откуда мержится)
        index:
          type: integer
          format: int64
          description: Индекс PR
          example: 42
        mergeable:
          type: boolean
          description: Признак отсутствия конфликтов у PR
        merge_info:
          type: object
          description: Информация о слиянии (заполняется только если PR слит)
          nullable: true
          properties:
            merged_at:
              type: string
              format: date-time
              example: '2019-08-24T14:15:22Z'
              description: Время слияния (если слит)
            merged_by:
              $ref: '#/components/schemas/ShortUserInfo'
              description: Пользователь, который смержил pull request
            merge_base:
              $ref: '#/components/schemas/Commit'
              description: SHA хеш последнего общего коммита (merge base)
            merge_commit_sha:
              $ref: '#/components/schemas/Commit'
              description: SHA коммита слияния (если слит)
          required:
            - merged_at
            - merged_by
            - merge_base
            - merge_commit_sha
        pr_creator:
          $ref: '#/components/schemas/ShortUserInfo'
          description: Автора pull request'а
        state:
          type: string
          enum:
            - open
            - closed
            - merged
          description: Состояние PR
          example: open
        title:
          type: string
          description: Заголовок PR
          example: Fix login validation
        updated_at:
          type: string
          format: date-time
          description: Время последнего обновления
          example: '2019-08-24T14:15:22Z'
        commits_count:
          type: integer
          format: int64
          description: Общее количество коммитов в pull request
          example: 3
          minimum: 0
        changed_files_count:
          type: integer
          format: int64
          description: Количество файлов, изменённых в pull request
          example: 5
          minimum: 0
        is_watching:
          type: boolean
          description: Флаг, показывающий подписался ли пользователь на уведомления по pull request
          example: true
        url:
          type: string
          description: API-ссылка на этот PR
          example: https://example.com/owner/repo/pulls/42
        discuss_count:
          type: integer
          format: int64
          description: Общее количество обсуждений в pull request (подсчитываются комментарии к PR)
          example: 3
          minimum: 0
        is_locked:
          type: boolean
          description: Флаг ограничения обсуждения (true = комментарии заблокированы)
          example: false
          default: false
      required:
        - title
        - body
        - state
        - created_at
        - updated_at
        - closed_at
        - pr_creator
        - base
        - head
        - index
        - url
        - merge_info
        - mergeable
        - commits_count
        - changed_files_count
        - is_watching
        - is_locked
        - discuss_count
    RepoTag:
      description: Тег репозитория
      type: object
      properties:
        id:
          type: string
          description: sha тега
        name:
          type: string
          description: Имя тега
        target:
          type: string
          description: Референс, к чему создавался тег (если тег был с аннотацией, то target будет пустым)
        sha:
          type: string
          description: Хэш коммита, к которому создали тег
        is_draft:
          type: boolean
          description: Черновик или нет (относится к релизам)
        is_tag:
          type: boolean
          description: Тег это или нет (релиз и тег - одна сущность в БД)
        is_prerelease:
          type: boolean
          description: Пре-релиз это или нет
        title:
          type: string
          description: Сообщение для аннотированного тега
        created_at:
          type: string
          format: date-time
          description: Время создания
      required:
        - id
        - name
        - target
        - sha
        - is_draft
        - is_tag
        - is_prerelease
        - title
        - created_at
    PaginatedRepoTagsList:
      description: Пагинированный список тегов репозитория
      type: object
      properties:
        pagination:
          $ref: '#/components/schemas/Pagination'
        data:
          description: Список тегов репозитория
          type: array
          items:
            $ref: '#/components/schemas/RepoTag'
      required:
        - pagination
        - data
    TagPayload:
      description: Объект, содержащий имя тега
      type: object
      properties:
        name:
          type: string
          description: Имя нового тега
          example: v.8.6.0
        commit_sha:
          type: string
          description: SHA коммита, к которому будет создан тег
          example: 9743187d2bc451afaf9ff3fb7ff4c556868958b7
      required:
        - name
    OperationSuccess:
      type: object
      required:
        - code
        - message
        - status
      properties:
        code:
          type: integer
          example: 200
          description: Код HTTP-ответа
        status:
          type: string
          example: Ok
          description: Статус ответа
        message:
          type: string
          example: Статус операции
          description: Описание статуса операции
    MetricsItem:
      type: object
      required:
        - key
        - name
        - type
        - domain
        - value
        - aux_metric_key
        - aux_metric_name
        - aux_metric_type
        - aux_metric_value
      properties:
        key:
          type: string
          description: Ключ метрики
        name:
          type: string
          description: Название метрики
        type:
          type: string
          description: Тип метрики
          enum:
            - INT
            - BOOL
            - PERCENT
            - FLOAT
            - RATING
          example: PERCENT
        domain:
          type: string
          description: Домен метрики
        value:
          type: string
          description: Значение метрики
        aux_metric_key:
          type: string
          description: Ключ aux метрики
        aux_metric_name:
          type: string
          description: Название aux метрики
        aux_metric_type:
          type: string
          description: Тип aux метрики
        aux_metric_value:
          type: string
          description: Значение aux метрики
    Metrics:
      type: object
      required:
        - sonarQubeStatus
        - analysedAt
        - sonarUrl
        - sonarProjectKey
        - metrics
      properties:
        sonarQubeStatus:
          type: string
          description: Общий статус анализа безопасности кода
          enum:
            - SUCCESS
            - WARNING
            - ERROR
            - NONE
          example: SUCCESS
        analysedAt:
          type: string
          format: date-time
          description: Дата проведения анализа
          example: '2025-11-20T06:16:25+03:00'
        sonarUrl:
          type: string
          description: Путь до прогона сонара
          format: uri
        sonarProjectKey:
          type: string
          description: Дата проведения анализа
          example: git-id
        metrics:
          type: array
          description: Список инструментов для сканирования кода и их результаты
          items:
            $ref: '#/components/schemas/MetricsItem'
    CommitStatus:
      type: object
      properties:
        description:
          type: string
          description: Описание статуса
          example: Build is running
        context:
          type: string
          description: Контекст проверки (например, CI/CD система)
          example: jenkins/build
        status:
          type: string
          enum:
            - pending
            - success
            - error
            - warning
            - failure
          description: Статус проверки
          example: pending
        url:
          type: string
          description: Ссылка на подробную информацию о статусе
          example: https://ci.company.com/job/123
      required:
        - context
        - status
    BuildStatus:
      type: object
      description: Актуальные статусы проверок, относящихся к одной сборке
      required:
        - overall_status
        - check_list
      properties:
        build_started_at:
          type: string
          format: date-time
          description: Дата начала сборки
        overall_status:
          type: string
          nullable: true
          description: |
            Статус проверки. При расчёте общего статуса используется приоритет: error > failure > warning > pending > success.
          enum:
            - success
            - pending
            - warning
            - failure
            - error
          example: pending
        check_list:
          type: array
          description: |
            Если сборка существует, то в ней может быть n количество проверок. Для каждой проверки существует один из 5 статусов. Проверки приходят с сортировкой по времени получения последнего статуса.
          items:
            $ref: '#/components/schemas/CommitStatus'
    PRUpdatePayload:
      type: object
      description: |
        Поля для частичного обновления Pull Request.
        Все поля опциональны. Хотя бы одно поле должно быть передано.
      properties:
        title:
          type: string
          description: Новый заголовок PR
          minLength: 1
          maxLength: 255
          example: Fix critical bug in auth module
        is_locked:
          type: boolean
          description: |
            Блокировка обсуждения:
            - `true` — запретить новые комментарии
            - `false` — разрешить обсуждение
          example: true
        base_name:
          type: string
          description: Имя новой целевой ветки (куда мержится PR)
          example: develop
        body_description:
          type: string
          description: |
            Новое текстовое описание PR (markdown).
            Для очистки описания передайте пустую строку или null.
          nullable: true
          example: |-
            ## Changes
            - Fixed validation logic
            - Added tests
        body_attachments:
          type: array
          description: |
            Полный актуальный список UUID вложений.
            При обновлении старый список заменяется новым.
            Для удаления всех вложений передайте пустой массив [].
          items:
            type: string
            format: uuid
          uniqueItems: true
          example:
            - 123e4567-e89b-12d3-a456-426614174000
            - 987fcdeb-51a2-43c7-9d8e-123456789abc
      minProperties: 1
      additionalProperties: false
    PRReviewInfo:
      type: object
      description: Информация по пользователям и статусу рецензии от них в PR
      properties:
        user:
          $ref: '#/components/schemas/ShortUserInfo'
        status:
          type: string
          enum:
            - APPROVED
            - COMMENTED
            - PENDING
          description: Статус рецензии
          example: APPROVED
          nullable: false
      required:
        - user
    PRMembers:
      type: object
      description: Информация по пользователям, участвующим PR
      properties:
        reviewers:
          type: array
          items:
            $ref: '#/components/schemas/PRReviewInfo'
          description: Список рецензетов, назначенных на pull request, с информацией о статусе их рецензии
        assignees:
          type: array
          items:
            $ref: '#/components/schemas/ShortUserInfo'
          description: Список пользователей, назначенных на pull request
        code_owners:
          type: array
          items:
            $ref: '#/components/schemas/PRReviewInfo'
          description: Список владельцев кода, назначенных на pull request, с информацией о статусе их рецензии
      required:
        - reviewers
        - assignees
        - code_owners
    EntityIdList:
      type: array
      description: Список уникальных числовых идентификаторов сущностей
      items:
        type: integer
        format: int64
        minimum: 1
      uniqueItems: true
      example:
        - 1
        - 2
        - 3
    PRMembersUpdatePayload:
      type: object
      description: |
        Поля для частичного обновления списков участников PR.
        Все поля опциональны. Хотя бы одно поле должно быть передано.
        Примечание:
          - reviewers и assignees можно изменять вручную.
          - code_owners определяются автоматически из файла CODEOWNERS и не могут быть изменены через API.
      properties:
        reviewers:
          $ref: '#/components/schemas/EntityIdList'
          description: |
            Новый список ID рецензентов.
            Заменяет предыдущий список целиком.
            Для удаления всех передайте пустой массив [].
        assignees:
          $ref: '#/components/schemas/EntityIdList'
          description: |
            Новый список ID назначенных пользователей.
            Заменяет предыдущий список целиком.
      minProperties: 1
      additionalProperties: false
    PullTask:
      type: object
      description: Информация о задаче, связанной с pull request
      properties:
        unit_code:
          type: string
          description: Код юнита или системы (соответствует полю 'code' в источнике)
          example: VCS-8898
        summary:
          type: string
          description: Заголовок/описание задачи (если доступно отдельно от номера)
          example: '[Story] Получение списка коммитов ПРа'
          nullable: true
        state:
          type: string
          description: Статус задачи (машинное или отображаемое значение)
          example: in review
          nullable: true
        priority:
          type: string
          description: Приоритет задачи
          example: Major
          nullable: true
        url:
          type: string
          format: uri
          description: Ссылка на задачу во внешней системе
          example: https://example.sbt/example/units/all/unit/VCS-8898
          nullable: true
      required:
        - unit_code
        - summary
        - state
        - priority
        - url
    PRLinkedTasks:
      type: object
      description: Информация по связанным с PR задачам
      properties:
        pagination:
          $ref: '#/components/schemas/Pagination'
        data:
          type: array
          items:
            $ref: '#/components/schemas/PullTask'
      required:
        - pagination
        - data
    PRAttributes:
      type: object
      description: Связанные с PR атрибуты репозитория (метки и этап)
      properties:
        labels:
          type: array
          items:
            $ref: '#/components/schemas/Label'
          description: Список лейблов, назначенных на pull request
        milestone:
          nullable: true
          type: object
          description: Этап, назначенный в pull request
          allOf:
            - $ref: '#/components/schemas/Milestone'
      required:
        - labels
        - milestone
    PRAttributesUpdatePayload:
      type: object
      description: |
        Поля для частичного обновления атрибутов PR.
        Все поля опциональны. Хотя бы одно поле должно быть передано.
      properties:
        labels:
          $ref: '#/components/schemas/EntityIdList'
          description: |
            Новый список ID меток для PR.
            Заменяет предыдущий список целиком.
            Для удаления всех меток передайте пустой массив [].
        milestone:
          type: integer
          format: int64
          minimum: 0
          description: |
            Идентификатор этапа (milestone) для PR.
            - Передайте `0` чтобы снять этап с PR.
            - Передайте положительное значение чтобы назначить этап с этим id.
          example: 5
      minProperties: 1
      additionalProperties: false
    TrackedTime:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/ShortUserInfo'
        seconds:
          type: integer
          description: Затраченное время по таймеру
          example: 18600
        is_timer_active:
          type: boolean
          description: Продолжает таймер отсчет или остановлен
          example: false
      required:
        - user
        - seconds
        - is_timer_active
    PRTimeAttributes:
      type: object
      description: Информация по атрибутам времени, добавленным в PR (отслеживание времени, срок исполнения)
      properties:
        tracked_time_by_user:
          type: array
          items:
            $ref: '#/components/schemas/TrackedTime'
          description: Список отслеживаний времени по пользователям
        due_date:
          type: string
          format: date-time
          description: Срок исполнения
          nullable: true
          example: '2019-08-24T14:15:22Z'
      required:
        - tracked_time_by_user
        - due_date
    PRDueDatePayload:
      type: object
      description: |
        Поле для обновления информации по сроку выполнения в PR.
      properties:
        due_date:
          type: string
          format: date-time
          nullable: true
          description: |
            Новый срок исполнения PR.
            - Дата-время в формате ISO 8601 — установить срок
            - null — очистить срок исполнения
          example: '2024-12-31T23:59:59Z'
      minProperties: 1
      additionalProperties: false
    PRTrackedTimePayload:
      type: object
      description: |
        Запрос на управление отслеживанием времени в PR.
        Поддерживаемые типы:
        - `start_timer` — запустить таймер для текущего пользователя
        - `stop_timer` — остановить активный таймер
        - `track` — добавить запись о затраченном времени вручную
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - start_timer
            - stop_timer
            - track
          description: |
            - start_timer игнорируется, если таймер уже запущен
            - stop_timer без активного таймера возвращает 400 Bad Request
            - track требует указания seconds
          example: start_timer
        seconds:
          type: integer
          description: |
            Затраченное время в секундах.
            Требуется только для type=track.
          minimum: 1
          example: 14400
      additionalProperties: false
    PRStatePayload:
      type: object
      description: Payload запроса на обновление состояния PR
      additionalProperties: false
      required:
        - state
      properties:
        state:
          type: string
          enum:
            - open
            - closed
            - merged
          description: Состояние PR
          example: open
        merge_method:
          type: string
          description: Способ слияния (только для state=merged)
          enum:
            - merge
            - squash
            - rebase
            - rebase-merge
            - manually-merged
    PRUpstreamInfo:
      type: object
      required:
        - target_branches
      properties:
        target_branches:
          type: array
          description: |
            Список веток, куда будет перелит PR по настройкам PRUpstream, в порядке последовательного слияния (от первой к последней). Если список пуст — PRUpstream не активен для данного PR.
          items:
            type: string
          example:
            - develop
            - feature1
            - feature2
    PRBranchUpdatePayload:
      type: object
      required:
        - strategy
      properties:
        strategy:
          type: string
          enum:
            - merge
            - rebase
          description: Стратегия обновления ветки (merge или rebase base в head)
          example: merge
    CommentContent:
      type: object
      properties:
        content:
          type: string
          description: Тело комментария
          example: Комментарий к ПР
    PRCommentPayload:
      allOf:
        - $ref: '#/components/schemas/CommentContent'
        - type: object
          description: Создание обычного комментария к PR. Также создание комментариев с помощью цитирования
          properties:
            attachment_uuids:
              type: array
              items:
                type: string
                format: uuid
            type:
              type: string
              enum:
                - general
          required:
            - content
            - type
    PRReviewCommentPayload:
      allOf:
        - $ref: '#/components/schemas/CommentContent'
        - type: object
          description: Параметры для создания ревью к ПР
          properties:
            type:
              type: string
              enum:
                - review
            event:
              type: string
              enum:
                - request_changes
                - approve
              description: |
                Действие ревьюера - `approve` - одобрить PR, `request_changes` - требовать правки.  Этих enum не существует в таблице comment. Они влияют на бизнес-логику на бэке
              example: approve
            attachment_uuids:
              type: array
              items:
                type: string
                format: uuid
          required:
