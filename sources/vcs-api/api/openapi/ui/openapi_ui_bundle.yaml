openapi: 3.0.3
info:
  title: SourceControl UI REST API
  version: 0.0.1
  license:
    name: Internal Proprietary License
    url: /
servers:
  - url: /web/v2
security:
  - cookieAuth: []
paths:
  /user:
    get:
      tags:
        - Users
      summary: Инфо о текущем (аутентифицированном) пользователе
      operationId: GetUserInfo
      responses:
        '200':
          $ref: '#/components/responses/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /configurations:
    get:
      tags:
        - Configuration
      summary: Получение конфигурации инсталяции
      operationId: GetConfiguration
      responses:
        '200':
          $ref: '#/components/responses/ConfigurationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /topics/search:
    get:
      summary: Поиск топиков (единый список топиков на всю инсталляцию)
      tags:
        - Topics
      operationId: GetTopicsList
      parameters:
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          $ref: '#/components/responses/TopicsListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/search:
    get:
      tags:
        - Repository
      summary: Поиск репозиториев (с фильтрацией и пагинацией)
      operationId: GetReposSearch
      parameters:
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/language'
        - $ref: '#/components/parameters/sort'
        - $ref: '#/components/parameters/archived'
        - $ref: '#/components/parameters/is_watching'
        - $ref: '#/components/parameters/is_favorite'
        - $ref: '#/components/parameters/is_in_source_hub'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - name: project_name
          in: query
          required: false
          description: Имя проекта. Если параметр не передан, то поиск ищет по всем проектам. Если передан - в конкретном проекте
          schema:
            type: string
            example: vcs
      responses:
        '200':
          $ref: '#/components/responses/ReposShortListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{project_name}/{repo_name}/external_metrics:
    get:
      tags:
        - Repository
      summary: Получение информации о внешних метриках репозитория
      operationId: GetRepoExternalMetrics
      parameters:
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/repo_name'
      responses:
        '200':
          $ref: '#/components/responses/RepoExternalMetricsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /projects/{project_name}:
    get:
      tags:
        - Projects
      summary: Получение информации о проекте
      operationId: GetProjectByName
      parameters:
        - $ref: '#/components/parameters/project_name'
      responses:
        '200':
          $ref: '#/components/responses/ProjectResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /projects/{project_name}/{action}:
    post:
      tags:
        - Projects
      summary: Подписаться/отписаться текущему пользователю от проекта
      operationId: ProjectSubscribeAction
      parameters:
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/action'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /projects/{project_name}/users:
    get:
      tags:
        - Projects
      summary: Список участников проекта
      operationId: GetProjectUsers
      parameters:
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          $ref: '#/components/responses/ProjectUsersResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /projects/{project_name}/repos:
    get:
      tags:
        - Projects
      summary: Список репозиториев проекта
      operationId: GetProjectRepos
      parameters:
        - $ref: '#/components/parameters/project_name'
      responses:
        '200':
          $ref: '#/components/responses/ReposListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /projects/{project_name}/repos/{repo_name}:
    get:
      tags:
        - Repository
      summary: Информации о репозитории
      operationId: GetRepo
      parameters:
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/repo_name'
        - $ref: '#/components/parameters/ref'
      responses:
        '200':
          $ref: '#/components/responses/RepoResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /projects/{project_name}/repos/{repo_name}/favorite:
    post:
      tags:
        - Repository
      summary: Добавить репозиторий в избранное
      operationId: SetFavoriteRepo
      parameters:
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/repo_name'
      responses:
        '201':
          $ref: '#/components/responses/NoContent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      tags:
        - Repository
      summary: Удалить репозиторий из избранного
      operationId: DeleteFavoriteRepo
      parameters:
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/repo_name'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /projects/{project_name}/repos/{repo_name}/subscribe:
    put:
      tags:
        - Repository
      summary: Обновить настройки отслеживания
      description: Обновляет настройки слежения за репозиторием
      operationId: updateRepoSubscription
      parameters:
        - name: project_name
          in: path
          required: true
          schema:
            type: string
            minLength: 1
          description: Имя проекта (организации), например `my_project`
        - name: repo_name
          in: path
          required: true
          schema:
            type: string
            minLength: 1
          description: Имя репозитория, например `my_repo`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RepositorySubscription'
      responses:
        '200':
          $ref: '#/components/responses/PutSubscription200'
        '201':
          $ref: '#/components/responses/PutSubscription201'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'
  /projects/{project_name}/repos/{repo_name}/branches:
    get:
      summary: Получить список веток
      tags:
        - Branches
      operationId: GetRepoBranches
      parameters:
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/repo_name'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/sort'
      responses:
        '200':
          $ref: '#/components/responses/BranchListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      summary: Создать новую ветку
      tags:
        - Branches
      operationId: CreateRepoBranch
      parameters:
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/repo_name'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BranchCreatePayload'
      responses:
        '201':
          $ref: '#/components/responses/BranchCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{project_name}/{repo_name}/labels:
    get:
      summary: Получить список меток (labels) репозитория
      tags:
        - Labels
      operationId: GetRepoLabels
      parameters:
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/repo_name'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          $ref: '#/components/responses/LabelsListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{project_name}/{repo_name}/users:
    get:
      tags:
        - Users
      summary: Получить список пользователей репозитория
      description: Возвращает список пользователей, имеющих доступ к репозиторию. Поддерживается поиск по логину, ФИО и email. Пагинация через page и limit.
      operationId: GetRepositoryUsers
      parameters:
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/repo_name'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          $ref: '#/components/responses/RepositoryUsersResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{project_name}/{repo_name}/milestones:
    get:
      summary: Получить список этапов (milestones) репозитория
      tags:
        - Milestones
      operationId: GetRepoMilestones
      parameters:
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/repo_name'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          $ref: '#/components/responses/MilestonesListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{project_name}/{repo_name}/pulls/template:
    get:
      summary: Получить шаблон для создания Pull Request
      description: Возвращает шаблон описания для Pull Request в формате plain text
      tags:
        - Template
      operationId: GetPullRequestTemplate
      parameters:
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/repo_name'
      responses:
        '200':
          description: Шаблон PR успешно получен
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Template'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{project_name}/{repo_name}/attachments:
    post:
      summary: Загрузить файл на сервер
      tags:
        - Attachments
      operationId: UploadFile
      parameters:
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/repo_name'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Массив файлов для загрузки (поддерживаются любые типы, включая бинарные)
              required:
                - files
      responses:
        '207':
          $ref: '#/components/responses/UploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{project_name}/{repo_name}/pulls:
    post:
      summary: Создать новый Pull Request
      tags:
        - Pulls
      operationId: CreatePullRequest
      parameters:
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/repo_name'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PullRequestCreatePayload'
      responses:
        '201':
          $ref: '#/components/responses/PullCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{project_name}/{repo_name}/tags:
    get:
      summary: Получить список тегов репозитория
      tags:
        - Tags
      operationId: GetRepoTagsList
      parameters:
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/repo_name'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/sort'
      responses:
        '200':
          $ref: '#/components/responses/RepoTagsListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      summary: Создать новый тег репозитория
      tags:
        - Tags
      operationId: CreateRepoTag
      parameters:
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/repo_name'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagPayload'
      responses:
        '201':
          $ref: '#/components/responses/RepoTagCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{project_name}/{repo_name}/topics:
    put:
      tags:
        - Topics
      summary: Метод обновления списка топиков репозитория
      operationId: PutRepoTopics
      parameters:
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/repo_name'
        - $ref: '#/components/parameters/topics'
      responses:
        '200':
          $ref: '#/components/responses/OperationSuccess'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{project_name}/{repo_name}/metrics:
    get:
      tags:
        - Metrics
      summary: Получение метрик проверки репозитория с помощью Sonarqube
      operationId: GetMetrics
      parameters:
        - $ref: '#/components/parameters/branch'
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/repo_name'
      responses:
        '200':
          $ref: '#/components/responses/MetricsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{project_name}/{repo_name}/build/status:
    get:
      summary: Получить информацию по статусам проверок сборки
      description: |
        Получить информацию по статусам проверок сборки можно получить через query параметр ?sha={string} Если для указанного sha нет ни одной проверки, возвращается объект BuildStatus с пустым check_list и overall_status = null.
      tags:
        - Repository
      operationId: GetBuildStatus
      x-internal: true
      parameters:
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/repo_name'
        - $ref: '#/components/parameters/sha'
      x-required-privilege: read
      responses:
        '200':
          $ref: '#/components/responses/BuildStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{project_name}/{repo_name}/pulls/{index}:
    get:
      summary: Получить pull request в репозитории по индексу
      tags:
        - Pulls
      operationId: GetPR
      x-required-privilege: read
      parameters:
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/repo_name'
        - $ref: '#/components/parameters/index'
      responses:
        '200':
          $ref: '#/components/responses/PRResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    patch:
      summary: |
        Частично обновить pull request в репозитории: обновить описание (в т.ч. указать WIP-префикс), ограничить комментарии, изменить целевую ветки, обновить тело пулреквеста, изменить список вложений
      tags:
        - Pulls
      operationId: UpdatePR
      x-required-privilege: write
      parameters:
        - $ref: '#/components/parameters/project_name'
        - $ref: '#/components/parameters/repo_name'
        - $ref: '#/components/parameters/index'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PRUpdatePayload'
      responses:
        '200':
          $ref: '#/components/responses/PRResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      summary: Удалить pull request
      tags:
        - Pulls
      operationId: DeleteRepoPR
