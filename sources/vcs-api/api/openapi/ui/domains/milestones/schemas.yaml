components:
  schemas:
    Milestone:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Уникальный идентификатор этапа
          example: 5
        name:
          type: string
          description: Название этапа
          example: Sprint 1
        description:
          type: string
          description: Описание этапа
          example: "Первый спринт разработки"
        due_date:
          type: string
          format: date-time
          nullable: true
          description: Дата завершения этапа
          example: '2024-03-01T23:59:59Z'
        state:
          type: string
          enum:
            - open
            - closed
          description: Состояние этапа
          example: open
      required:
        - id
        - name
        - state

    PaginatedMilestonesList:
      type: object
      description: Пагинированный список этапов
      properties:
        pagination:
            $ref: '../../common/pagination.yaml#/components/schemas/Pagination'
        data:
          type: array
          items:
            $ref: '#/components/schemas/Milestone'
          description: Список этапов репозитория
      required:
        - data
        - pagination
