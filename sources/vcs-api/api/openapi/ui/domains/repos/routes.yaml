RepoSubscribe:
  put:
    tags:
      - Repository
    summary: Обновить настройки отслеживания
    description: Обновляет настройки слежения за репозиторием
    operationId: updateRepoSubscription
    parameters:
      - name: project_name
        in: path
        required: true
        schema:
          type: string
          minLength: 1
        description: "Имя проекта (организации), например `my_project`"
      - name: repo_name
        in: path
        required: true
        schema:
          type: string
          minLength: 1
        description: "Имя репозитория, например `my_repo`"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/components/schemas/RepositorySubscription'
    responses:
      '200':
        $ref: './responses.yaml#/components/responses/PutSubscription200'
      '201':
        $ref: './responses.yaml#/components/responses/PutSubscription201'
      '400':
        $ref: '../../common/errors.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../common/errors.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../common/errors.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../common/errors.yaml#/components/responses/NotFound'
      '409':
        $ref: '../../common/errors.yaml#/components/responses/Conflict'
      '500':
        $ref: '../../common/errors.yaml#/components/responses/ServerError'

