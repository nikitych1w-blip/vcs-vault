RepoRawFile:
  get:
    tags:
      - Repository
    summary: Получить содержимое файла в формате base64
    description: |
      Получение файла из репозитория (с возможностью указать ветку/тэг)
      Поддерживаются форматы:
        Исходный код (.go, .py, .js, .java, .rs, .ts, .c, .cpp, .h, .cs, .rb, .php, .sh, .sql, и др.),
        Markdown (.md, .markdown),
        CSV / TSV (.csv, .tsv),
        JSON,
        YAML / TOML,
        XML,
        Diff / Patch (.diff, .patch),
        SVG (.svg),
        Изображения (.png, .jpg, .jpeg, .gif, .webp),
        Текстовые файлы (.txt, .log, без расширения: LICENSE, README, CHANGELOG).
    operationId: GetRepoRawFile
    parameters:
      - $ref: '../../common/params.yaml#/components/parameters/project_name'
      - $ref: '../../common/params.yaml#/components/parameters/repo_name'
      - name: ref
        in: query
        required: false
        description: >
          Ссылка на ветку или тег в формате `branch/<название>` или `tag/<название>`.
          Например: `branch/develop`, `tag/release/8.1.0`. Если не передан, то по умолчанию - дефолтная ветка репозитория.
        schema:
          type: string
          pattern: '^(branch|tag)/.+$'
        example: branch/develop
      - name: path
        in: query
        required: true
        schema:
          type: string
        description: Путь к файлу от корневой директории. Например README.md или src/spa/index.js
    responses:
      '200':
        $ref: './responses.yaml#/components/responses/RepoRawFileResponse'
      '400':
        $ref: '../../common/errors.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../common/errors.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../common/errors.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../common/errors.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../common/errors.yaml#/components/responses/ServerError'


BuildStatusRoute:
  get:
    summary: Получить информацию по статусам проверок сборки
    description: >
      Получить информацию по статусам проверок сборки можно получить через query параметр ?sha={string}
      Если для указанного sha нет ни одной проверки, возвращается объект BuildStatus с пустым check_list и overall_status = null.
    tags:
      - Repository
    operationId: GetBuildStatus
    x-internal: true
    parameters:
      - $ref: '../../common/params.yaml#/components/parameters/project_name'
      - $ref: '../../common/params.yaml#/components/parameters/repo_name'
      - $ref: './params.yaml#/components/parameters/sha'
    x-required-privilege: read
    responses:
      '200':
        $ref: './responses.yaml#/components/responses/BuildStatusResponse'
      '400':
        $ref: '../../common/errors.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../common/errors.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../common/errors.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../common/errors.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../common/errors.yaml#/components/responses/ServerError'