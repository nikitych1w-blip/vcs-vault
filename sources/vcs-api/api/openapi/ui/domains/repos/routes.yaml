ReposSearch:
  get:
    tags:
      - Repository
    summary: Поиск репозиториев (с фильтрацией и пагинацией)
    operationId: GetReposSearch
    parameters:
      - $ref: '../../common/params.yaml#/components/parameters/q'
      - $ref: './params.yaml#/components/parameters/language'
      - $ref: '../../common/params.yaml#/components/parameters/sort'
      - $ref: './params.yaml#/components/parameters/archived'
      - $ref: './params.yaml#/components/parameters/is_watching'
      - $ref: './params.yaml#/components/parameters/is_favorite'
      - $ref: './params.yaml#/components/parameters/is_in_source_hub'
      - $ref: '../../common/params.yaml#/components/parameters/page'
      - $ref: '../../common/params.yaml#/components/parameters/limit'
      - name: project_name
        in: query
        required: false
        description: Имя проекта. Если параметр не передан, то поиск ищет по всем проектам. Если передан - в конкретном проекте
        schema:
          type: string
          example: vcs
    responses:
      '200':
        $ref: './responses.yaml#/components/responses/ReposShortListResponse'
      '400':
        $ref: '../../common/errors.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../common/errors.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../common/errors.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../common/errors.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../common/errors.yaml#/components/responses/ServerError'

