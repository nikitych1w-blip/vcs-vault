RepoPulls:
  post:
    summary: Создать новый Pull Request
    tags:
      - Pulls
    operationId: CreatePullRequest
    parameters:
      - $ref: '../../common/params.yaml#/components/parameters/project_name'
      - $ref: '../../common/params.yaml#/components/parameters/repo_name'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/components/schemas/PullRequestCreatePayload'
    responses:
      '201':
        $ref: './responses.yaml#/components/responses/PullCreateResponse'
      '400':
        $ref: '../../common/errors.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../common/errors.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../common/errors.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../common/errors.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../common/errors.yaml#/components/responses/ServerError'

PRBuild:
  post:
    summary: Запустить/перезапустить сборку PR
    description: >
      Инициирует сборку для указанного PR.
      Ответ означает, что запрос принят в работу. Текущий статус сборки клиент получает
      через GET /merge_checks
    tags:
      - Pulls
    operationId: PRBuild
    x-required-privilege: write
    parameters:
      - $ref: '../../common/params.yaml#/components/parameters/project_name'
      - $ref: '../../common/params.yaml#/components/parameters/repo_name'
      - $ref: './params.yaml#/components/parameters/index'
    responses:
      '202':
        $ref: '../../common/success.yaml#/components/responses/NoContent'
      '400':
        $ref: '../../common/errors.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../common/errors.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../common/errors.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../common/errors.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../common/errors.yaml#/components/responses/ServerError'

RepoPR:
  get:
    summary: Получить pull request в репозитории по индексу
    tags:
      - Pulls
    operationId: GetPR
    x-required-privilege: read
    parameters:
      - $ref: '../../common/params.yaml#/components/parameters/project_name'
      - $ref: '../../common/params.yaml#/components/parameters/repo_name'
      - $ref: './params.yaml#/components/parameters/index'
    responses:
      '200':
        $ref: './responses.yaml#/components/responses/PRResponse'
      '400':
        $ref: '../../common/errors.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../common/errors.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../common/errors.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../common/errors.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../common/errors.yaml#/components/responses/ServerError'
  patch:
    summary: >
      Частично обновить pull request в репозитории:
      обновить описание (в т.ч. указать WIP-префикс),
      ограничить комментарии,
      изменить целевую ветки,
      обновить тело пулреквеста,
      изменить список вложений
    tags:
      - Pulls
    operationId: UpdatePR
    x-required-privilege: write
    parameters:
      - $ref: '../../common/params.yaml#/components/parameters/project_name'
      - $ref: '../../common/params.yaml#/components/parameters/repo_name'
      - $ref: './params.yaml#/components/parameters/index'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/components/schemas/PRUpdatePayload'
    responses:
      '200':
        $ref: './responses.yaml#/components/responses/PRResponse'
      '400':
        $ref: '../../common/errors.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../common/errors.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../common/errors.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../common/errors.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../common/errors.yaml#/components/responses/ServerError'
  delete:
    summary: Удалить pull request
    tags:
      - Pulls
    operationId: DeleteRepoPR
    x-required-privilege: write
    parameters:
      - $ref: '../../common/params.yaml#/components/parameters/project_name'
      - $ref: '../../common/params.yaml#/components/parameters/repo_name'
      - $ref: './params.yaml#/components/parameters/index'
    responses:
      '204':
        description: Pull request успешно удалён
      '400':
        $ref: '../../common/errors.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../common/errors.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../common/errors.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../common/errors.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../common/errors.yaml#/components/responses/ServerError'

PRMembers:
  get:
    summary: Получить информацию по пользователям, участвующим в pull request
    tags:
      - Pulls
    operationId: GetPRMembers
    x-required-privilege: read
    parameters:
      - $ref: '../../common/params.yaml#/components/parameters/project_name'
      - $ref: '../../common/params.yaml#/components/parameters/repo_name'
      - $ref: './params.yaml#/components/parameters/index'
    responses:
      '200':
        $ref: './responses.yaml#/components/responses/PRMembersResponse'
      '400':
        $ref: '../../common/errors.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../common/errors.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../common/errors.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../common/errors.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../common/errors.yaml#/components/responses/ServerError'
  patch:
      summary: Частично обновить участников pull request - заменить списки рецензентов, назначенных пользователей
      description: |
        Обновление списков участников PR.

        Правила применения:
        - Все поля опциональны, обновляются только переданные значения
        - Массивы заменяются целиком (старые значения удаляются)
        - Для удаления всех элементов передайте пустой массив []
      tags:
        - Pulls
      operationId: UpdatePRMembers
      parameters:
        - $ref: '../../common/params.yaml#/components/parameters/project_name'
        - $ref: '../../common/params.yaml#/components/parameters/repo_name'
        - $ref: './params.yaml#/components/parameters/index'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/components/schemas/PRMembersUpdatePayload'
      responses:
        '200':
          description: Участники успешно обновлены
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/PRMembers'
        '400':
          $ref: '../../common/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../common/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../common/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../common/errors.yaml#/components/responses/NotFound'
        '500':
          $ref: '../../common/errors.yaml#/components/responses/ServerError'

