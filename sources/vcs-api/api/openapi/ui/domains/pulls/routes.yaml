PRCommentReactions:
  patch:
    tags:
      - Pulls
    summary: Обновить реакции на комментарий 
    description: >
      Метод позволяет обновить набор реакций текущего пользователя на комментарий.
      Клиент передает полный итоговый список реакций текущего пользователя
      [] - пустой массив соответствует тому, что реакций пользователя на комментарий нет
      ['fire'] - пользователь поставил одну реакцию на комментарий
      ['fire', 'thumds_up'] - пользователь поставил 2 реакции на комментарий

    operationId: UpdatePRCommentReactions
    x-internal: true
    parameters:
      - $ref: '../../common/params.yaml#/components/parameters/project_name'
      - $ref: '../../common/params.yaml#/components/parameters/repo_name'
      - $ref: './params.yaml#/components/parameters/index'
      - $ref: './params.yaml#/components/parameters/comment_id'
    x-required-privilege: create_pr || approve_pr || merge_pr
    requestBody:
      required: true
      content:
        application/json:
          schema:
