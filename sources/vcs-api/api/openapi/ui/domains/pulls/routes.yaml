PRState:
  post:
    summary: Изменить состояние PR (closed/open/merged)
    description: >
      Меняет состояние pull request. Поддерживаемые переходы:
      open->close(closed), close->open(open) , open->merge (merged),
      Запрещены такие варианты - merge ->close, merge -> open, close->merge
    tags:
      - Pulls
    operationId: UpdatePRState
    x-required-privilege: write || merge_pr || merge_without_check
    parameters:
      - $ref: '../../common/params.yaml#/components/parameters/project_name'
      - $ref: '../../common/params.yaml#/components/parameters/repo_name'
      - $ref: './params.yaml#/components/parameters/index'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/components/schemas/PRStatePayload'
    responses:
      '204':
        $ref: '../../common/success.yaml#/components/responses/NoContent'
      '400':
        $ref: '../../common/errors.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../common/errors.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../common/errors.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../common/errors.yaml#/components/responses/NotFound'
      '409':
        $ref: '../../common/errors.yaml#/components/responses/Conflict'
      '500':
        $ref: '../../common/errors.yaml#/components/responses/ServerError'
