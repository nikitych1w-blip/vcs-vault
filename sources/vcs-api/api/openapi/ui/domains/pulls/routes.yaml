PRAttributes:
  get:
    summary: Получить информацию по связанным с pull request атрибутам репозитория (метки и этап)
    tags:
      - Pulls
    operationId: GetPRAttributes
    x-required-privilege: read
    parameters:
      - $ref: '../../common/params.yaml#/components/parameters/project_name'
      - $ref: '../../common/params.yaml#/components/parameters/repo_name'
      - $ref: './params.yaml#/components/parameters/index'
    responses:
      '200':
        $ref: './responses.yaml#/components/responses/PRAttributesResponse'
      '400':
        $ref: '../../common/errors.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../common/errors.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../common/errors.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../common/errors.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../common/errors.yaml#/components/responses/ServerError'
  patch:
      summary: >
        Частично обновить атрибуты pull request:
        заменить метки (labels),
        изменить этап (milestone)
      description: |
        Обновление атрибутов PR (метки и этап).
        Правила применения:
        - Массив labels заменяется целиком (старые метки удаляются, новые добавляются)
        - Для удаления всех меток передайте пустой массив []
        - Для снятия milestone передайте `milestone: 0`
      tags:
        - Pulls
      operationId: UpdatePRAttributes
      x-required-privilege: write
      parameters:
        - $ref: '../../common/params.yaml#/components/parameters/project_name'
        - $ref: '../../common/params.yaml#/components/parameters/repo_name'
        - $ref: './params.yaml#/components/parameters/index'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/components/schemas/PRAttributesUpdatePayload'
      responses:
        '200':
          description: Атрибуты успешно обновлены
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/PRAttributes'
        '400':
          $ref: '../../common/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../common/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../common/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../common/errors.yaml#/components/responses/NotFound'
        '500':
          $ref: '../../common/errors.yaml#/components/responses/ServerError'

