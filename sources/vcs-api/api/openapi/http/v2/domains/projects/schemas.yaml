components:
  schemas:
    Project:
      type: object
      additionalProperties: false
      description: Проект
      required: [id, name, project_key, visibility, uri]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        project_key:
          type: string
        visibility:
          type: integer
          format: int32
          description: Уровень видимости
        uri:
          type: string

    CreateProjectRequest:
      type: object
      additionalProperties: false
      description: Запрос создания проекта
      required: [tenant_key, name, project_key, visibility]
      properties:
        tenant_key:
          type: string
        name:
          type: string
          maxLength: 40
        project_key:
          type: string
          maxLength: 50
        description:
          type: string
          maxLength: 255
        visibility:
          type: integer
          format: int32
          description: Уровень видимости

    ProjectKey:
      type: object
      additionalProperties: false
      description: Ключ проекта
      required: [project_key]
      properties:
        project_key:
          type: string
