RepoBranches:
  parameters:
    - $ref: '../../common/params.yaml#/components/parameters/Tenant'
    - $ref: '../../common/params.yaml#/components/parameters/Project'
    - $ref: '../../common/params.yaml#/components/parameters/Repo'
  get:
    tags:
      - branches
    summary: List branches
    operationId: v3ListBranches
    parameters:
      - name: page
        in: query
        description: Номер страницы
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        description: Количество элементов на странице
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: q
        in: query
        description: Поисковый запрос по имени ветки
        schema:
          type: string
      - name: sort
        in: query
        description: Сортировка (name, date)
        schema:
          type: string
    responses:
      '200':
        $ref: './responses.yaml#/components/responses/BranchListResponse'
      '400':
        $ref: '../../common/errors.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../common/errors.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../common/errors.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../common/errors.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../common/errors.yaml#/components/responses/ServerError'
  post:
    tags:
      - branches
    summary: Create branch
    operationId: v3CreateBranch
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/components/schemas/BranchCreation'
    responses:
      '201':
        $ref: './responses.yaml#/components/responses/BranchCreateResponse'
      '400':
        $ref: '../../common/errors.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../common/errors.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../common/errors.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../common/errors.yaml#/components/responses/NotFound'
      '409':
        $ref: '../../common/errors.yaml#/components/responses/Conflict'
      '500':
        $ref: '../../common/errors.yaml#/components/responses/ServerError'
RepoBranch:
  parameters:
    - $ref: '../../common/params.yaml#/components/parameters/Tenant'
    - $ref: '../../common/params.yaml#/components/parameters/Project'
    - $ref: '../../common/params.yaml#/components/parameters/Repo'
    - $ref: '../../common/params.yaml#/components/parameters/BranchName'
  get:
    tags:
      - branches
    summary: Get branch
    operationId: v3GetBranch
    responses:
      '200':
        $ref: './responses.yaml#/components/responses/BranchGetResponse'
      '400':
        $ref: '../../common/errors.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../common/errors.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../common/errors.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../common/errors.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../common/errors.yaml#/components/responses/ServerError'
  delete:
    tags:
      - branches
    summary: Delete branch
    operationId: v3DeleteBranch
    responses:
      '204':
        $ref: './responses.yaml#/components/responses/BranchDeleteResponse'
      '400':
        $ref: '../../common/errors.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../common/errors.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../common/errors.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../common/errors.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../common/errors.yaml#/components/responses/ServerError'
