RepoCompareCommits:
  parameters:
    - $ref: '../../common/params.yaml#/components/parameters/Tenant'
    - $ref: '../../common/params.yaml#/components/parameters/Project'
    - $ref: '../../common/params.yaml#/components/parameters/Repo'
  get:
    tags:
      - compare
    summary: Compare commits
    operationId: v3CompareCommits
    parameters:
      - name: from
        in: query
        description: Ресурс (ветка/тег/SHA) от которого производится поиск разницы. По умолчанию — ветка по умолчанию.
        schema:
          type: string
      - name: to
        in: query
        description: Ресурс (ветка/тег/SHA) до которого производится поиск разницы. По умолчанию — ветка по умолчанию.
        schema:
          type: string
      - name: page
        in: query
        description: Номер страницы
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        description: Количество элементов на странице
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
    responses:
      '200':
        $ref: './responses.yaml#/components/responses/CompareCommitsResponse'
      '400':
        $ref: '../../common/errors.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../common/errors.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../common/errors.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../common/errors.yaml#/components/responses/NotFound'
      '409':
        $ref: '../../common/errors.yaml#/components/responses/Conflict'
      '500':
        $ref: '../../common/errors.yaml#/components/responses/ServerError'
