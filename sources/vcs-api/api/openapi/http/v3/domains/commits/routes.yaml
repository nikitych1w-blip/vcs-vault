RepoCommits:
  parameters:
    - $ref: '../../common/params.yaml#/components/parameters/Tenant'
    - $ref: '../../common/params.yaml#/components/parameters/Project'
    - $ref: '../../common/params.yaml#/components/parameters/Repo'
  get:
    tags:
      - commits
    summary: List commits
    operationId: v3ListCommits
    parameters:
      - name: page
        in: query
        description: Номер страницы
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        description: Количество элементов на странице
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: since
        in: query
        description: SHA или имя ветки (начало диапазона)
        schema:
          type: string
      - name: until
        in: query
        description: SHA или имя ветки (конец диапазона)
        schema:
          type: string
      - name: path
        in: query
        description: Фильтр по пути файла/директории
        schema:
          type: string
    responses:
      '200':
        $ref: './responses.yaml#/components/responses/CommitListResponse'
      '400':
        $ref: '../../common/errors.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../common/errors.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../common/errors.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../common/errors.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../common/errors.yaml#/components/responses/ServerError'
CommitPullRequests:
  parameters:
    - $ref: '../../common/params.yaml#/components/parameters/Tenant'
    - $ref: '../../common/params.yaml#/components/parameters/Project'
    - $ref: '../../common/params.yaml#/components/parameters/Repo'
    - $ref: '../../common/params.yaml#/components/parameters/CommitSha'
  get:
    tags:
      - commits
    summary: List pull requests associated with a commit
    operationId: v3GetCommitPullRequests
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
        description: Номер страницы
      - name: limit
        in: query
        schema:
          type: integer
          default: 30
          minimum: 10
          maximum: 100
        description: Количество элементов на странице
      - name: sort
        in: query
        schema:
          type: string
          default: 'updated_at:desc,created_at:desc'
        description: >
          Сортировка. Формат: field:direction[,field:direction,...].
          Допустимые поля: created_at, updated_at, due_date. Максимум 3 поля.
    responses:
      '200':
        $ref: '../pulls/responses.yaml#/components/responses/CommitPullRequestsResponse'
      '400':
        $ref: '../../common/errors.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../common/errors.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../common/errors.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../common/errors.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../common/errors.yaml#/components/responses/ServerError'
