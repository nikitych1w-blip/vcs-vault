RepoPullIssues:
  parameters:
    - $ref: '../../common/params.yaml#/components/parameters/Tenant'
    - $ref: '../../common/params.yaml#/components/parameters/Project'
    - $ref: '../../common/params.yaml#/components/parameters/Repo'
    - $ref: '../../common/params.yaml#/components/parameters/PullRequestIndex'
  get:
    tags:
      - pulls
    summary: Get linked task tracker issues for a pull request
    operationId: v3GetPRIssues
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
        description: Номер страницы
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 10
          maximum: 100
        description: Количество элементов на странице
      - name: sort
        in: query
        schema:
          type: string
          default: 'code:asc'
        description: >
          Список полей задачи для сортировки через запятую.
          Поддерживаемые поля: code, status, title, priority.
          После имени поля можно указать порядок: :asc или :desc.
    responses:
      '200':
        $ref: './responses.yaml#/components/responses/PRIssuesGetResponse'
      '400':
        $ref: '../../common/errors.yaml#/components/responses/BadRequest'
      '404':
        $ref: '../../common/errors.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../common/errors.yaml#/components/responses/ServerError'
