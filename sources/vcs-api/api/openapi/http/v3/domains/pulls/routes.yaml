RepoPullFiles:
  parameters:
    - $ref: '../../common/params.yaml#/components/parameters/Tenant'
    - $ref: '../../common/params.yaml#/components/parameters/Project'
    - $ref: '../../common/params.yaml#/components/parameters/Repo'
    - $ref: '../../common/params.yaml#/components/parameters/PullRequestIndex'
  get:
    tags:
      - pulls
    summary: List changed files in pull request
    operationId: v3GetPRFiles
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
        description: Номер страницы
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 10
          maximum: 100
        description: Количество элементов на странице
      - name: sort
        in: query
        schema:
          type: string
          default: 'filepath:asc'
        description: >
          Сортировка. Формат: field:direction.
          Допустимые поля: filepath, status.
    responses:
      '200':
        $ref: './responses.yaml#/components/responses/PullRequestFilesResponse'
      '400':
        $ref: '../../common/errors.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../common/errors.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../common/errors.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../common/errors.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../common/errors.yaml#/components/responses/ServerError'
