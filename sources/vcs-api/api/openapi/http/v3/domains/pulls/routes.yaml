RepoPulls:
  parameters:
    - $ref: '../../common/params.yaml#/components/parameters/Tenant'
    - $ref: '../../common/params.yaml#/components/parameters/Project'
    - $ref: '../../common/params.yaml#/components/parameters/Repo'
  get:
    tags:
      - pulls
    summary: List pull requests
    operationId: v3ListPullRequests
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
        description: Номер страницы
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
        description: Количество элементов на странице
      - name: state
        in: query
        schema:
          type: string
          enum: [open, closed, all]
          default: open
        description: Фильтр по состоянию
      - name: sort
        in: query
        schema:
          type: string
        description: Сортировка (created_at, updated_at, due_date)
      - name: milestone
        in: query
        schema:
          type: integer
          format: int64
        description: Фильтр по вехе
      - name: labels
        in: query
        schema:
          type: string
        description: Фильтр по меткам (через запятую)
      - name: target_branch
        in: query
        schema:
          type: string
        description: Фильтр по целевой ветке
      - name: author
        in: query
        schema:
          type: string
        description: Фильтр по автору
    responses:
      '200':
        $ref: './responses.yaml#/components/responses/PullRequestListResponse'
      '400':
        $ref: '../../common/errors.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../common/errors.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../common/errors.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../common/errors.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../common/errors.yaml#/components/responses/ServerError'
  post:
    tags:
      - pulls
    summary: Create pull request
    operationId: v3CreatePullRequest
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/components/schemas/PRCreation'
    responses:
      '201':
        $ref: './responses.yaml#/components/responses/PullRequestCreateResponse'
      '400':
        $ref: '../../common/errors.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../common/errors.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../common/errors.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../common/errors.yaml#/components/responses/NotFound'
      '409':
        $ref: '../../common/errors.yaml#/components/responses/Conflict'
      '500':
        $ref: '../../common/errors.yaml#/components/responses/ServerError'
RepoPull:
