RepoSystemLabel:
  parameters:
    - $ref: ../../common/params.yaml#/components/parameters/Tenant
    - $ref: ../../common/params.yaml#/components/parameters/Project
    - $ref: ../../common/params.yaml#/components/parameters/Repo
    - $ref: ../../common/params.yaml#/components/parameters/SystemLabel
  get:
    tags:
      - repos
    summary: Получение значения системной метки репозитория
    description: Возвращает текущее значение указанной системной метки для репозитория
    operationId: getSystemLabel
    responses:
      '200':
        $ref: ./responses.yaml#/components/responses/RepoSystemLabelGetResponse
      '400':
        $ref: ../../common/errors.yaml#/components/responses/BadRequest
      '401':
        $ref: ../../common/errors.yaml#/components/responses/Unauthorized
      '403':
        $ref: ../../common/errors.yaml#/components/responses/Forbidden
      '404':
        $ref: ../../common/errors.yaml#/components/responses/NotFound
      '500':
        $ref: ../../common/errors.yaml#/components/responses/ServerError
  put:
    tags:
      - repos
    summary: Установка значения системной метки репозитория
    description: Устанавливает значение для указанной системной метки репозитория. В текущей версии поддерживается только метка `tier0`
    operationId: setSystemLabel
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ./schemas.yaml#/components/schemas/LabelValue
    responses:
      '201':
        $ref: ./responses.yaml#/components/responses/RepoSystemLabelSetResponse
      '400':
        $ref: ../../common/errors.yaml#/components/responses/BadRequest
      '401':
        $ref: ../../common/errors.yaml#/components/responses/Unauthorized
      '403':
        $ref: ../../common/errors.yaml#/components/responses/Forbidden
      '404':
        $ref: ../../common/errors.yaml#/components/responses/NotFound
      '500':
        $ref: ../../common/errors.yaml#/components/responses/ServerError
