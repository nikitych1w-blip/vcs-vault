ProjectRepos:
  parameters:
    - $ref: ../../common/params.yaml#/components/parameters/Tenant
    - $ref: ../../common/params.yaml#/components/parameters/Project
  get:
    tags:
      - repos
    summary: List repositories in project
    operationId: v3ListRepositories
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
        description: Номер страницы
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
        description: Количество элементов на странице
      - name: q
        in: query
        schema:
          type: string
        description: Поисковый запрос
      - name: sort
        in: query
        schema:
          type: string
        description: Сортировка (name, created_at, updated_at, stars, forks)
    responses:
      '200':
        $ref: ./responses.yaml#/components/responses/RepositoriesListResponse
      '400':
        $ref: ../../common/errors.yaml#/components/responses/BadRequest
      '401':
        $ref: ../../common/errors.yaml#/components/responses/Unauthorized
      '403':
        $ref: ../../common/errors.yaml#/components/responses/Forbidden
      '404':
        $ref: ../../common/errors.yaml#/components/responses/NotFound
      '500':
        $ref: ../../common/errors.yaml#/components/responses/ServerError
  post:
    tags:
      - repos
    summary: Create repository in project
    operationId: v3CreateRepository
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ./schemas.yaml#/components/schemas/RepoCreate
    responses:
      '201':
        $ref: ./responses.yaml#/components/responses/RepositoryCreateResponse
      '400':
        $ref: ../../common/errors.yaml#/components/responses/BadRequest
      '401':
        $ref: ../../common/errors.yaml#/components/responses/Unauthorized
      '403':
        $ref: ../../common/errors.yaml#/components/responses/Forbidden
      '404':
        $ref: ../../common/errors.yaml#/components/responses/NotFound
      '409':
        $ref: ../../common/errors.yaml#/components/responses/Conflict
      '500':
        $ref: ../../common/errors.yaml#/components/responses/ServerError
