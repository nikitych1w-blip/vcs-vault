components:
  parameters:
    archive_sha:
      name: sha
      in: query
      required: true
      description: SHA коммита (4-40 hex символов)
      schema:
        type: string
        pattern: '^[0-9a-f]{4,40}$'
        minLength: 4
        maxLength: 40
    archive_format:
      name: format
      in: query
      required: false
      description: Формат архива. По умолчанию zip.
      schema:
        type: string
        enum:
          - zip
          - tar.gz
          - tgz
        default: zip
    archive_prefix:
      name: prefix
      in: query
      required: false
      description: Путь-префикс в архиве репозитория
      schema:
        type: string
