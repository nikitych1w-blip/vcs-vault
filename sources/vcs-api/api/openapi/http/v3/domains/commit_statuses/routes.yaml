CommitStatuses:
  parameters:
    - $ref: '../../common/params.yaml#/components/parameters/Tenant'
    - $ref: '../../common/params.yaml#/components/parameters/Project'
    - $ref: '../../common/params.yaml#/components/parameters/Repo'
    - name: commit_sha
      in: path
      required: true
      schema:
        type: string
        pattern: '^[0-9a-f]{40}$'
        minLength: 40
        maxLength: 40
      description: SHA коммита
  get:
    tags:
      - commit_statuses
    summary: List commit statuses
    operationId: v3ListCommitStatuses
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
        description: Номер страницы
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 10
          maximum: 100
        description: Количество элементов на странице
      - name: sort
        in: query
        schema:
          type: string
          default: 'created_at:asc'
        description: >
          Сортировка. Формат: field:direction[,field:direction,...].
          Допустимые поля: created_at, updated_at, context, state.
          Направления: asc, desc. Максимум 3 поля.
    responses:
      '200':
        $ref: './responses.yaml#/components/responses/CommitStatusListResponse'
      '400':
        $ref: '../../common/errors.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../common/errors.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../common/errors.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../common/errors.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../common/errors.yaml#/components/responses/ServerError'
  post:
    tags:
      - commit_statuses
    summary: Create or update commit status
    operationId: v3CreateCommitStatus
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/components/schemas/CommitStatusCreateRequest'
    responses:
      '201':
        $ref: './responses.yaml#/components/responses/CommitStatusCreateResponse'
      '400':
        $ref: '../../common/errors.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../common/errors.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../common/errors.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../common/errors.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../common/errors.yaml#/components/responses/ServerError'
