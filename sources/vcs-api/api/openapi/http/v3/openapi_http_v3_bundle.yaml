        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
      parameters:
        - description: Название коммита/ветки/тэга (например, main, v1.2.0, a1b2c3d). По умолчанию — основная ветка репозитория.
          in: query
          name: ref
          schema:
            type: string
        - description: Номер страницы. Если не указан — подразумевается первая страница. При запросе по пути к файлу параметр игнорируется.
          in: query
          name: page
          schema:
            type: integer
        - description: Максимальное количество элементов, возвращаемых в списке. Если не указано — по умолчанию максимальное количество элементов списка. При запросе по пути к файлу параметр игнорируется.
          in: query
          name: limit
          schema:
            type: integer
        - description: |-
            Список полей файла для сортировки через запятую. Поддерживаемые поля: name, updated_at, size, type.

            После имени поля можно указать порядок:
            - :asc — по возрастанию,
            - :desc — по убыванию.
            Если порядок не указан, используется :asc.

            Если параметр sort не передан, сервер применяет сортировку по умолчанию:
            type:asc,name:asc.

            Ограничения:
            - Максимум 3 поля.
            - Общая длина не более 100 символов.
          in: query
          name: sort
          schema:
            type: string
