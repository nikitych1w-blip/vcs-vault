        - full_name
        - email
        - avatar_url
      properties:
        login:
          type: string
          description: Логин пользователя
          example: john.doe
        full_name:
          type: string
          description: Полное имя пользователя
          example: John Doe
        email:
          type: string
          description: Email пользователя
          example: john.doe@example.com
        avatar_url:
          type: string
          description: URL аватара пользователя
          example: https://example.com/avatars/john.png
    UserTokenCreate:
      additionalProperties: false
      properties:
        name:
          description: Уникальное человекочитаемое имя токена
          example: CI/CD pipeline token
          maxLength: 100
          minLength: 1
          type: string
        scopes:
          description: Список разрешённых прав доступа (scopes) для токена
          example:
            - repo:read
            - user:profile
          items:
            example: repo:read
            pattern: ^[a-z_]+:[a-z_]+
            type: string
          type: array
          uniqueItems: true
      required:
        - name
        - scopes
      type: object
    UserTokenCreated:
      properties:
        created_at:
          format: date-time
          type: string
        id:
          format: int64
          type: integer
        name:
          type: string
        scopes:
          items:
            type: string
          type: array
        sha1:
          type: string
        token_last_eight:
          type: string
      required:
        - id
        - name
        - scopes
        - sha1
        - token_last_eight
        - created_at
      type: object
    UserKeyCreate:
      properties:
        key:
          description: SSH публичный ключ
          type: string
        read_only:
          description: Создать ключ только для чтения
          type: boolean
        title:
          description: Название ключа
          type: string
      required:
        - title
        - key
      type: object
    UserKey:
      properties:
        created_at:
          format: date-time
          type: string
        fingerprint:
          type: string
        id:
          format: int64
          type: integer
        key:
          type: string
        read_only:
          type: boolean
        title:
          type: string
        user_login:
          type: string
      required:
        - id
        - title
        - key
        - fingerprint
        - read_only
        - user_login
        - created_at
      type: object
  parameters:
    Tenant:
      name: tenant
      in: path
      required: true
      description: Tenant identifier
      schema:
        type: string
    Project:
      name: project
      in: path
      required: true
      description: Project identifier
      schema:
        type: string
    Repo:
      name: repo
      in: path
      required: true
      description: Repository identifier
      schema:
        type: string
    BranchName:
      name: branch_name
      in: path
      required: true
      description: Branch name
      schema:
        type: string
    PullRequestIndex:
      name: index
      in: path
      required: true
      description: Pull request index
      schema:
        type: integer
        format: int64
    CommentId:
      name: comment_id
      in: path
      required: true
      description: Comment identifier
      schema:
        type: integer
        format: int64
    SystemLabel:
      name: label_name
      in: path
      required: true
      description: Название системной метки (в текущей версии только `tier0`)
      schema:
        type: string
        enum:
          - tier0
        example: tier0
    WildcardPattern:
      name: pattern
      in: path
      required: true
      description: Wildcard pattern (router uses `/*`)
      schema:
        type: string
    Path:
      name: path
      in: path
      required: true
      description: File path (may include slashes; greedy match in router)
      schema:
        type: string
    archive_sha:
      name: sha
      in: query
      required: true
      description: SHA коммита (4-40 hex символов)
      schema:
        type: string
        pattern: ^[0-9a-f]{4,40}$
        minLength: 4
        maxLength: 40
    archive_format:
      name: format
      in: query
      required: false
      description: Формат архива. По умолчанию zip.
      schema:
        type: string
        enum:
          - zip
          - tar.gz
          - tgz
        default: zip
    archive_prefix:
      name: prefix
      in: query
      required: false
      description: Путь-префикс в архиве репозитория
      schema:
        type: string
    Metric:
      name: metric
      in: path
      required: true
      description: Metric name
      schema:
        type: string
    CommitSha:
      name: commit_sha
      in: path
      required: true
      description: Commit SHA (7–40 hex characters)
      schema:
        type: string
        pattern: ^[0-9a-f]{7,40}$
        minLength: 7
        maxLength: 40
    Username:
      name: username
      in: path
      required: true
      description: Username
      schema:
        type: string
  headers:
    X-Request-ID:
      description: |
        Уникальный идентификатор запроса. 
        **Обязательно сохраняйте это значение для обращения в техническую поддержку.**
      schema:
        type: string
        format: uuid
      example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
