components:
  securitySchemes:
    authorizationHeaderToken:
      type: apiKey
      in: header
      name: Authorization
      description: API tokens must be prepended with "token" followed by a space.
    basicHttpAuthentication:
      type: http
      scheme: basic
      description: Авторизация по логину и паролю
    accessToken:
      type: apiKey
      in: query
      name: access_token
      description: API access token passed as a query parameter.
  responses:
    SwaggerRedirectResponse:
      description: Редирект на Swagger UI
      headers:
        Location:
          description: URL Swagger UI
          schema:
            type: string
            example: /api/swagger_v3
    Unauthorized:
      description: Требуется аутентификация
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: null
            status: 401
            title: Требуется аутентификация
            detail: Токен доступа отсутствует или недействителен.
            instance: /repos/tenant/project/repo
    Forbidden:
      description: Доступ запрещён
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: null
            status: 403
            title: Доступ запрещён
            detail: Недостаточно прав для выполнения операции.
            instance: /repos/tenant/project/repo
    ServerError:
      description: Ошибка сервера
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: null
            status: 500
            title: Ошибка сервера
            detail: Произошла внутренняя ошибка. Повторите запрос позже.
            instance: /repos/tenant/project/repo
    BranchListResponse:
      description: Список веток репозитория с пагинацией
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BranchListResponse'
    BadRequest:
      description: Некорректный запрос
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: null
            status: 400
            title: Некорректный запрос
            detail: Обнаружены ошибки в переданных данных.
            instance: /repos/tenant/project/repo/branches
            validation:
              - location: field
                name: branch_name
                error: Имя ветки не может быть пустым.
                code: required_field
    NotFound:
      description: Ресурс не найден
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: null
            status: 404
            title: Ресурс не найден
            detail: Запрашиваемый ресурс не существует.
            instance: /repos/tenant/project/repo
    BranchCreateResponse:
      description: Ветка успешно создана
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BranchItem'
    Conflict:
      description: Конфликт данных или бизнес-правил
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: null
            status: 409
            title: Конфликт данных
            detail: Ресурс с такими параметрами уже существует.
            instance: /repos/tenant/project/repo/branches
    BranchGetResponse:
      description: Информация о ветке
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Branch'
    BranchDeleteResponse:
      description: Ветка успешно удалена
    CompareCommitsResponse:
      description: Результат сравнения коммитов
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CompareCommitsResponse'
    PullRequestListResponse:
      description: Список пулл-реквестов
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PullRequestListResponse'
    PullRequestCreateResponse:
      description: Пулл-реквест успешно создан
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PRInfo'
    PullRequestGetResponse:
      description: Информация о пулл-реквесте
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PRInfo'
    PullRequestUpdateResponse:
      description: Пулл-реквест обновлён
