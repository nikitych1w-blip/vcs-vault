openapi: 3.0.3
info:
  title: SourceControl API v3
  description: SourceControl REST API v3
  version: 0.0.0-dev
  license:
    name: Internal Proprietary License
    url: https://example.invalid/
servers:
  - url: /api/v3
security:
  - authorizationHeaderToken: []
  - basicHttpAuthentication: []
  - accessToken: []
paths:
  /swagger:
    get:
      tags:
        - admin
      summary: Redirect to Swagger UI
      description: Делает redirect (303 See Other) на Swagger UI (`/api/swagger_v3`).
      operationId: v3RedirectSwagger
      responses:
        '303':
          $ref: '#/components/responses/SwaggerRedirectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{tenant}/{project}/{repo}/branches:
    parameters:
      - $ref: '#/components/parameters/Tenant'
      - $ref: '#/components/parameters/Project'
      - $ref: '#/components/parameters/Repo'
    get:
      tags:
        - branches
      summary: List branches
      operationId: v3ListBranches
      parameters:
        - name: page
          in: query
          description: Номер страницы
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          description: Количество элементов на странице
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: q
          in: query
          description: Поисковый запрос по имени ветки
          schema:
            type: string
        - name: sort
          in: query
          description: Сортировка (name, date)
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/BranchListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags:
        - branches
      summary: Create branch
      operationId: v3CreateBranch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BranchCreation'
      responses:
        '201':
          $ref: '#/components/responses/BranchCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{tenant}/{project}/{repo}/branches/{branch_name}:
    parameters:
      - $ref: '#/components/parameters/Tenant'
      - $ref: '#/components/parameters/Project'
      - $ref: '#/components/parameters/Repo'
      - $ref: '#/components/parameters/BranchName'
    get:
      tags:
        - branches
      summary: Get branch
      operationId: v3GetBranch
      responses:
        '200':
          $ref: '#/components/responses/BranchGetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      tags:
        - branches
      summary: Delete branch
      operationId: v3DeleteBranch
      responses:
        '204':
          $ref: '#/components/responses/BranchDeleteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{tenant}/{project}/{repo}/compare/commits:
    parameters:
      - $ref: '#/components/parameters/Tenant'
      - $ref: '#/components/parameters/Project'
      - $ref: '#/components/parameters/Repo'
    get:
      tags:
        - compare
      summary: Compare commits
      operationId: v3CompareCommits
      parameters:
        - name: from
          in: query
          description: Ресурс (ветка/тег/SHA) от которого производится поиск разницы. По умолчанию — ветка по умолчанию.
          schema:
            type: string
        - name: to
          in: query
          description: Ресурс (ветка/тег/SHA) до которого производится поиск разницы. По умолчанию — ветка по умолчанию.
          schema:
            type: string
        - name: page
          in: query
          description: Номер страницы
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          description: Количество элементов на странице
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          $ref: '#/components/responses/CompareCommitsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{tenant}/{project}/{repo}/pulls:
    parameters:
      - $ref: '#/components/parameters/Tenant'
      - $ref: '#/components/parameters/Project'
      - $ref: '#/components/parameters/Repo'
    get:
      tags:
        - pulls
      summary: List pull requests
      operationId: v3ListPullRequests
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Номер страницы
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Количество элементов на странице
        - name: state
          in: query
          schema:
            type: string
            enum:
              - open
              - closed
              - all
            default: open
          description: Фильтр по состоянию
        - name: sort
          in: query
          schema:
            type: string
          description: Сортировка (created_at, updated_at, due_date)
        - name: milestone
          in: query
          schema:
            type: integer
            format: int64
          description: Фильтр по вехе
        - name: labels
          in: query
          schema:
            type: string
          description: Фильтр по меткам (через запятую)
        - name: target_branch
          in: query
          schema:
            type: string
          description: Фильтр по целевой ветке
        - name: author
          in: query
          schema:
            type: string
          description: Фильтр по автору
      responses:
        '200':
          $ref: '#/components/responses/PullRequestListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags:
        - pulls
      summary: Create pull request
      operationId: v3CreatePullRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PRCreation'
      responses:
        '201':
          $ref: '#/components/responses/PullRequestCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{tenant}/{project}/{repo}/pulls/{index}:
    parameters:
      - $ref: '#/components/parameters/Tenant'
      - $ref: '#/components/parameters/Project'
      - $ref: '#/components/parameters/Repo'
      - $ref: '#/components/parameters/PullRequestIndex'
    get:
      tags:
        - pulls
      summary: Get pull request
      operationId: v3GetPullRequest
      responses:
        '200':
          $ref: '#/components/responses/PullRequestGetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    patch:
      tags:
        - pulls
      summary: Update pull request
      operationId: v3UpdatePullRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PRPatch'
      responses:
        '200':
          $ref: '#/components/responses/PullRequestUpdateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{tenant}/{project}/{repo}/pulls/{index}/merge:
    parameters:
      - $ref: '#/components/parameters/Tenant'
      - $ref: '#/components/parameters/Project'
      - $ref: '#/components/parameters/Repo'
      - $ref: '#/components/parameters/PullRequestIndex'
    post:
      tags:
        - pulls
      summary: Merge pull request
      operationId: v3MergePullRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PRMerge'
      responses:
        '200':
          $ref: '#/components/responses/PullRequestMergeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{tenant}/{project}/{repo}/pulls/{index}/decline:
    parameters:
      - $ref: '#/components/parameters/Tenant'
      - $ref: '#/components/parameters/Project'
      - $ref: '#/components/parameters/Repo'
      - $ref: '#/components/parameters/PullRequestIndex'
    post:
      tags:
        - pulls
      summary: Decline pull request
      operationId: v3DeclinePullRequest
      responses:
        '200':
          $ref: '#/components/responses/PullRequestDeclineResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PRDeclineRequest'
        required: true
  /repos/{tenant}/{project}/{repo}/pulls/{index}/files:
    parameters:
      - $ref: '#/components/parameters/Tenant'
      - $ref: '#/components/parameters/Project'
      - $ref: '#/components/parameters/Repo'
      - $ref: '#/components/parameters/PullRequestIndex'
    get:
      tags:
        - pulls
      summary: List changed files in pull request
      operationId: v3GetPRFiles
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Номер страницы
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 10
            maximum: 100
          description: Количество элементов на странице
        - name: sort
          in: query
          schema:
            type: string
            default: filepath:asc
          description: |
            Сортировка. Формат: field:direction. Допустимые поля: filepath, status.
      responses:
        '200':
          $ref: '#/components/responses/PullRequestFilesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{tenant}/{project}/{repo}/pulls/{index}/commits:
    parameters:
      - $ref: '#/components/parameters/Tenant'
      - $ref: '#/components/parameters/Project'
      - $ref: '#/components/parameters/Repo'
      - $ref: '#/components/parameters/PullRequestIndex'
    get:
      tags:
        - pulls
      summary: List commits in pull request
      operationId: v3GetPRCommits
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Номер страницы
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 10
            maximum: 100
          description: Количество элементов на странице
        - name: sort
          in: query
          schema:
            type: string
            default: created:asc
          description: |
            Сортировка. Формат: field:direction. Допустимое поле: created.
      responses:
        '200':
          $ref: '#/components/responses/PullRequestCommitsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{tenant}/{project}/{repo}/pulls/{index}/diff:
    parameters:
      - $ref: '#/components/parameters/Tenant'
      - $ref: '#/components/parameters/Project'
      - $ref: '#/components/parameters/Repo'
      - $ref: '#/components/parameters/PullRequestIndex'
    get:
      tags:
        - pulls
      summary: Download pull request diff or patch
      operationId: v3PullRequestDiff
      parameters:
        - name: diffType
          in: query
          schema:
            type: string
            enum:
              - diff
              - patch
            default: diff
          description: Формат вывода (diff или patch)
      responses:
        '200':
          $ref: '#/components/responses/PullRequestDiffResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{tenant}/{project}/{repo}/pulls/{index}/issues:
    parameters:
      - $ref: '#/components/parameters/Tenant'
      - $ref: '#/components/parameters/Project'
      - $ref: '#/components/parameters/Repo'
      - $ref: '#/components/parameters/PullRequestIndex'
    get:
      tags:
        - pulls
      summary: Get linked task tracker issues for a pull request
      operationId: v3GetPRIssues
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Номер страницы
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 10
            maximum: 100
          description: Количество элементов на странице
        - name: sort
          in: query
          schema:
            type: string
            default: code:asc
          description: |
            Список полей задачи для сортировки через запятую. Поддерживаемые поля: code, status, title, priority. После имени поля можно указать порядок: :asc или :desc.
      responses:
        '200':
          $ref: '#/components/responses/PRIssuesGetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{tenant}/{project}/{repo}/pulls/{index}/comments:
    parameters:
      - $ref: '#/components/parameters/Tenant'
      - $ref: '#/components/parameters/Project'
      - $ref: '#/components/parameters/Repo'
      - $ref: '#/components/parameters/PullRequestIndex'
    get:
      tags:
        - comments
      summary: List comments on pull request
      operationId: v3GetPRComments
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Номер страницы
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 100
          description: Количество элементов на странице
        - name: sort
          in: query
          schema:
            type: string
            enum:
              - created_at
              - updated_at
          description: |
            Сортировка по полю. Допустимые значения: created_at, updated_at.
        - name: state
          in: query
          schema:
            type: string
          description: Фильтр по состоянию комментария
      responses:
        '200':
          $ref: '#/components/responses/CommentListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags:
        - comments
      summary: Add comment to pull request
      operationId: v3AddPRComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PRCommentCreateOptions'
      responses:
        '201':
          $ref: '#/components/responses/CommentCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{tenant}/{project}/{repo}/pulls/{index}/comments/{comment_id}:
    parameters:
      - $ref: '#/components/parameters/Tenant'
      - $ref: '#/components/parameters/Project'
      - $ref: '#/components/parameters/Repo'
      - $ref: '#/components/parameters/PullRequestIndex'
      - $ref: '#/components/parameters/CommentId'
    get:
      tags:
        - comments
      summary: Get a single comment
      operationId: v3GetPRComment
      responses:
        '200':
          $ref: '#/components/responses/CommentGetResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    patch:
      tags:
        - comments
      summary: Update comment
      operationId: v3UpdatePRComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentUpdate'
      responses:
        '200':
          $ref: '#/components/responses/CommentUpdateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      tags:
        - comments
      summary: Delete comment
      operationId: v3DeletePRComment
      responses:
        '204':
          $ref: '#/components/responses/CommentDeleteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{tenant}/{project}/{repo}/subscription:
    parameters:
      - $ref: '#/components/parameters/Tenant'
      - $ref: '#/components/parameters/Project'
      - $ref: '#/components/parameters/Repo'
    get:
      tags:
        - repos
      summary: Get repository subscription settings for current user
      operationId: v3GetRepoSubscription
      responses:
        '200':
          $ref: '#/components/responses/SubscriptionGetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{tenant}/{project}/{repo}/default-branch:
    parameters:
      - $ref: '#/components/parameters/Tenant'
      - $ref: '#/components/parameters/Project'
      - $ref: '#/components/parameters/Repo'
    put:
      tags:
        - repos
      summary: Set default branch
      operationId: v3SetDefaultBranch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetDefaultBranchBody'
      responses:
        '200':
          $ref: '#/components/responses/DefaultBranchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /repos/{tenant}/{project}/{repo}/system-labels/{label_name}:
    parameters:
      - $ref: '#/components/parameters/Tenant'
      - $ref: '#/components/parameters/Project'
      - $ref: '#/components/parameters/Repo'
      - $ref: '#/components/parameters/SystemLabel'
    get:
      tags:
        - repos
      summary: Получение значения системной метки репозитория
      description: Возвращает текущее значение указанной системной метки для репозитория
      operationId: getSystemLabel
      responses:
        '200':
          $ref: '#/components/responses/RepoSystemLabelGetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      tags:
        - repos
      summary: Установка значения системной метки репозитория
      description: Устанавливает значение для указанной системной метки репозитория. В текущей версии поддерживается только метка `tier0`
      operationId: setSystemLabel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LabelValue'
      responses:
        '201':
          $ref: '#/components/responses/RepoSystemLabelSetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
