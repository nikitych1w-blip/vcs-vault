          example: true
          nullable: true
          type: boolean
        force_merge:
          description: Принудительно выполнить слияние, игнорируя статусы CI/CD и правила защиты. По умолчанию false
          example: false
          nullable: true
          type: boolean
        head_commit_id:
          description: SHA последнего коммита в ветке PR. Используется для проверки актуальности.
          example: a1b2c3d4e5f6...
          maxLength: 40
          minLength: 1
          nullable: true
          type: string
        merge_commit_id:
          description: SHA коммита, который должен быть использован как merge commit. Если указан, то этот коммит будет результирующий. Контрольный параметр, подтверждающий, что слияние выполняется для конкретного состояния PR.
          example: a1b2c3d4e5f6...
          maxLength: 40
          minLength: 1
          nullable: true
          type: string
        merge_method:
          description: 'Метод интеграции одной ветки в другую. Доступные значения: merge, squash, rebase, rebase-merge, manually-merged'
          enum:
            - merge
            - squash
            - rebase
            - rebase-merge
            - manually-merged
          example: rebase
          type: string
        merge_when_checks_succeed:
          description: Автоматически слить PR, когда все проверки пройдут. По умолчанию false
          example: false
          nullable: true
          type: boolean
