  schemas:
    ValidationError:
      type: object
      properties:
        location:
          description: Местоположение ошибки
          type: string
          enum:
            - field
            - param
            - header
          example: field
        name:
          description: Имя параметра/поля
          type: string
          example: branch_name
        error:
          description: Человекочитаемое сообщение об ошибке
          type: string
          example: Имя ветки не может быть пустым.
        code:
          description: Машиночитаемый код ошибки
          type: string
          example: required_field
    ProblemDetail:
      description: Стандартный формат ответа об ошибке (RFC 9457)
      type: object
      required:
        - type
        - status
        - title
        - detail
        - instance
      properties:
        type:
          description: URI-идентификатор типа ошибки
          type: string
          format: uri
          nullable: true
          example: null
        status:
          description: HTTP статус код ошибки
          type: integer
          format: int32
          minimum: 400
          maximum: 599
          example: 400
        title:
          description: Человекочитаемое краткое описание типа ошибки
          type: string
          example: Некорректный запрос
        detail:
          description: Конкретное сообщение об ошибке для текущего случая
          type: string
          example: Обнаружены ошибки в переданных данных.
        instance:
          description: URI, идентифицирующий данное конкретное возникновение ошибки
          type: string
          format: uri-reference
          example: /repos/tenant/project/repo/branches
        validation:
          description: Массив ошибок валидации, null если ошибок валидации нет
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ValidationError'
    shortCommitInfo:
      properties:
        created_at:
          description: Дата создания коммита
          example: '2025-04-05T14:30:00Z'
          format: date-time
          type: string
        hash:
          description: Хэш коммита
          example: abc1234
          type: string
        title:
          description: Заголовок коммита
          example: Update dependencies
          type: string
      required:
        - hash
        - title
        - created_at
      type: object
    BranchItem:
      description: Информация о ветке
      properties:
        commit:
          $ref: '#/components/schemas/shortCommitInfo'
        name:
          description: Название ветки
          type: string
        protected:
          description: Защищена ли ветка
          type: boolean
        protection_rules:
          description: Правила защиты ветки
          items:
            type: string
          type: array
      required:
        - name
        - protected
        - commit
      type: object
    Pagination:
      type: object
      description: Объект, представляющий информацию о пагинации
      properties:
        current_page:
          type: integer
          description: Текущая страница
          example: 1
        per_page:
          type: integer
          description: Число элементов на одной странице
          example: 30
        total_pages:
          type: integer
          description: Всего страниц
          example: 10
        total_items:
          type: integer
          description: Общее количество элементов
          example: 250
    BranchListResponse:
      description: Список веток репозитория с пагинацией
      properties:
        branches:
          description: Список веток
          items:
            $ref: '#/components/schemas/BranchItem'
          type: array
        pagination:
          $ref: '#/components/schemas/Pagination'
      required:
        - pagination
        - branches
      type: object
    BranchCreation:
      properties:
        new_branch:
          description: Имя новой ветки
          example: new_branch_name
          maxLength: 100
          minLength: 1
          type: string
        parent_commit_SHA:
          description: SHA родительского коммита
          example: d94b5f7ec7c6d7602c78a5e9b8a5b8c94d093eda
          maxLength: 40
          minLength: 4
          pattern: ^[0-9a-fA-F]{4,40}$
          type: string
      required:
        - new_branch
        - parent_commit_SHA
      type: object
    Branch:
      description: Возвращаемая новая ветка
      properties:
        commit:
          $ref: '#/components/schemas/shortCommitInfo'
        name:
          description: Имя ветки
          example: main
          type: string
        protected:
          description: Является ли ветка защищённой
          example: true
          type: boolean
        protection_rules:
          items:
            description: Имена правил защиты, применённых к ветке. Не возвращается если protected False
            example:
              - '*'
              - main
            type: string
          type: array
      required:
        - name
        - protected
        - commit
      type: object
