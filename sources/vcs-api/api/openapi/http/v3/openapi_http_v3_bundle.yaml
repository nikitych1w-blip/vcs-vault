          $ref: '#/components/schemas/CommitUserWithDateInfo'
        created:
          type: string
          format: date-time
          description: Дата создания коммита
          example: '2025-04-05T14:30:00Z'
        html_url:
          type: string
          description: Ссылка на коммит в интерфейсе
          nullable: true
        message:
          type: string
          description: Сообщение коммита
        parents:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/CommitParentOrTreeInfo'
        sha:
