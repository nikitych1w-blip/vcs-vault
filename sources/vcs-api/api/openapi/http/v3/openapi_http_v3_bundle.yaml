      content:
        text/plain:
          schema:
            type: string
    PRIssuesGetResponse:
      description: Список задач пулл-реквеста
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PRIssuesResponse'
    CommentListResponse:
      description: Список комментариев к пулл-реквесту
      content:
        application/json:
          schema:
